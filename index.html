<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0C0A0D" />
<title>IronTrunks</title>
<link rel="manifest" href="./manifest.webmanifest" />
<link rel="apple-touch-icon" href="./icon-192.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="IronTrunks" />
<style>
  @font-face{ font-family:"IronDisp"; src:url("./display.woff") format("woff"); font-weight:400 900; font-style:normal; font-display:swap; }
  :root{
    --ink:#0C0A0D; --panel:#15111A; --panel2:#1E1722; --line:#3C2E36;
    --teal:#E51D34; --tealdim:#F1B23E; --text:#EDE6D6; --muted:#9C8F86;
    --amber:#F1B23E; --red:#FF5563; --green:#5BD46A;
    --gold:#F1B23E; --crimson:#E51D34; --crimson-deep:#8E1020;
    --mono: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    --disp: "IronDisp","Arial Black",Roboto,sans-serif;
  }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ margin:0; padding:0; background:#000; color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; }
  body{ max-width:480px; margin:0 auto; min-height:100vh;
    background:radial-gradient(120% 80% at 50% -8%, #1c0d12 0%, var(--ink) 55%), var(--ink); }
  body::after{ content:""; position:fixed; inset:0; pointer-events:none; z-index:60;
    background:repeating-linear-gradient(rgba(0,0,0,0) 0 2px, rgba(0,0,0,.14) 2px 3px); mix-blend-mode:multiply; }
  body::before{ content:""; position:fixed; inset:0; pointer-events:none; z-index:59;
    box-shadow:inset 0 0 130px 28px rgba(0,0,0,.7); }
  button{ font-family:inherit; cursor:pointer; border:none; background:none; color:inherit; }
  input,select{ font-family:inherit; }
  .mono{ font-family:var(--mono); font-variant-numeric:tabular-nums; }
  .app{ position:relative; min-height:100vh; z-index:1; }

  header{ display:flex; align-items:center; justify-content:space-between; padding:16px 16px 10px; }
  .brand{ display:flex; align-items:center; gap:11px; }
  .seal{ flex:0 0 auto; width:44px; height:44px; border-radius:50%; display:grid; place-items:center;
    color:var(--text); font-size:23px; font-weight:700; transform:rotate(-6deg);
    background:radial-gradient(circle at 35% 30%, #c0162a, #7c0d1c); border:2px solid var(--gold);
    box-shadow:0 0 13px rgba(229,29,52,.5), inset 0 0 8px rgba(0,0,0,.5); text-shadow:0 1px 2px rgba(0,0,0,.6); }
  .logo{ font-family:var(--disp); font-weight:900; font-size:26px; line-height:.9; transform:skewX(-8deg);
    letter-spacing:-.01em; text-transform:uppercase; color:var(--text);
    text-shadow:2px 2px 0 var(--crimson-deep), 4px 4px 0 rgba(0,0,0,.4); }
  .logo .dot{ color:var(--gold); }
  .logo b{ color:var(--crimson); font-weight:900; }
  .sub{ text-transform:uppercase; letter-spacing:.2em; font-size:10px; color:var(--muted); margin-top:4px; font-family:var(--mono); }
  main{ padding:0 16px 122px; }
  .stack > * + *{ margin-top:18px; }
  .stack-sm > * + *{ margin-top:11px; }

  .label{ font-family:var(--disp); font-weight:900; text-transform:uppercase; letter-spacing:.08em;
    font-size:11px; color:var(--gold); transform:skewX(-8deg); display:inline-block; }
  .note-muted{ text-transform:uppercase; letter-spacing:.14em; font-size:9.5px; color:var(--muted); font-family:var(--mono); }
  .hint{ text-transform:uppercase; letter-spacing:.08em; font-size:11px; color:var(--gold); margin-top:7px; font-family:var(--mono); }
  .hint b{ color:var(--crimson); }

  .banner{ position:relative; margin:0 0 10px; padding:9px 15px;
    background:repeating-linear-gradient(115deg, rgba(241,178,62,.12) 0 8px, transparent 8px 18px),
      linear-gradient(90deg, var(--crimson-deep), #4a0a14 70%, transparent);
    border-left:4px solid var(--crimson); clip-path:polygon(0 0, 100% 0, calc(100% - 15px) 100%, 0 100%); }
  .banner .t{ font-family:var(--disp); font-weight:900; font-size:15px; transform:skewX(-8deg); display:inline-block;
    text-transform:uppercase; letter-spacing:.04em; color:var(--text); text-shadow:1px 1px 0 rgba(0,0,0,.5); }
  .banner .jp{ font-family:var(--mono); font-size:10px; color:var(--gold); margin-left:8px; letter-spacing:.08em; }

  .card{ position:relative; background:linear-gradient(180deg, var(--panel), var(--ink)); border:1px solid var(--line);
    padding:15px; clip-path:polygon(0 0, calc(100% - 16px) 0, 100% 16px, 100% 100%, 16px 100%, 0 calc(100% - 16px)); }
  .card::before{ content:""; position:absolute; left:0; right:0; top:0; height:2px; background:rgba(241,178,62,.28); }

  .field{ background:#0a0709; border:1px solid var(--line); padding:10px 12px; }
  .field input, .field select{ background:transparent; color:var(--text); border:none; outline:none; width:100%; font-size:15px; }
  .inp-num{ font-family:var(--mono); font-size:18px; font-weight:700; color:var(--text); }
  .row2{ display:grid; grid-template-columns:1fr 1fr; gap:11px; }
  .row3{ display:grid; grid-template-columns:1fr 1fr 1fr; gap:11px; }

  .chips{ display:flex; gap:8px; flex-wrap:wrap; margin-top:8px; }
  .chip{ position:relative; padding:8px 14px; font-family:var(--disp); font-weight:900; font-size:13px;
    text-transform:uppercase; letter-spacing:.03em; color:var(--muted); background:var(--panel2);
    border:1px solid var(--line); clip-path:polygon(0 0, 100% 0, 100% 100%, 8px 100%, 0 calc(100% - 8px)); }
  .chip.on{ color:#1a0d0d; background:linear-gradient(180deg, var(--gold), #d4912a); border-color:var(--gold);
    box-shadow:0 0 12px rgba(241,178,62,.45); }

  .btn{ position:relative; width:100%; padding:14px; font-family:var(--disp); font-weight:900; font-size:16px;
    text-transform:uppercase; letter-spacing:.04em; color:#190a0a; overflow:hidden;
    background:linear-gradient(180deg,#ff3144,var(--crimson) 40%,#a81223); border:2px solid var(--gold);
    box-shadow:0 0 16px rgba(229,29,52,.45), inset 0 2px 0 rgba(255,255,255,.22);
    display:flex; align-items:center; justify-content:center; gap:8px;
    clip-path:polygon(0 0, calc(100% - 12px) 0, 100% 12px, 100% 100%, 12px 100%, 0 calc(100% - 12px)); }
  .btn::after{ content:""; position:absolute; inset:0; pointer-events:none;
    background:repeating-linear-gradient(115deg, rgba(255,255,255,.13) 0 6px, transparent 6px 16px); }
  .btn.ghost{ background:transparent; color:var(--muted); border:1px dashed var(--line); box-shadow:none; }
  .btn.ghost::after{ display:none; }
  .btn.tealtext{ background:transparent; color:var(--gold); border:1px dashed var(--line); font-size:13px; padding:10px; box-shadow:none; }
  .btn.tealtext::after{ display:none; }
  .btn.danger{ background:linear-gradient(180deg,#ff3144,var(--crimson) 40%,#a81223); }
  .btn.small{ padding:12px; font-size:14px; }

  .item{ background:var(--panel); border:1px solid var(--line); border-left:3px solid var(--crimson); padding:9px 13px;
    display:flex; align-items:center; justify-content:space-between; gap:12px; }
  .item .x{ color:var(--muted); padding:4px; flex:0 0 auto; font-size:18px; line-height:1; }
  .truncate{ overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .min0{ min-width:0; }
  .empty{ border:1px dashed var(--line); color:var(--muted); padding:22px 16px; text-align:center; font-size:14px; margin-top:8px; }

  .gauge-wrap{ margin-bottom:12px; }
  .gauge-top{ display:flex; justify-content:space-between; align-items:baseline; margin-bottom:5px; }
  .gauge-name{ font-family:var(--disp); font-weight:900; font-size:12px; transform:skewX(-8deg); display:inline-block;
    text-transform:uppercase; letter-spacing:.05em; color:var(--text); }
  .gauge-val{ font-family:var(--mono); font-size:12px; }
  .gauge-val b{ color:var(--text); font-weight:700; }
  .gauge-val .t{ color:var(--muted); }
  .gauge{ height:15px; background:#0a0709; border:1px solid var(--line); transform:skewX(-14deg); overflow:hidden;
    position:relative; box-shadow:inset 0 0 6px rgba(0,0,0,.7); }
  .gfill{ height:100%; position:relative; width:0; transition:width .45s cubic-bezier(.2,.8,.2,1);
    background:linear-gradient(90deg, var(--crimson), var(--gold)); }
  .gfill.good{ background:linear-gradient(90deg,#2fa84a,var(--green)); }
  .gfill.over{ background:linear-gradient(90deg,#a81223,var(--red)); }
  .gfill::after{ content:""; position:absolute; inset:0; background:repeating-linear-gradient(90deg, transparent 0 11px, rgba(0,0,0,.5) 11px 13px); }

  .stat{ position:relative; background:linear-gradient(180deg, var(--panel), var(--ink)); border:1px solid var(--line); padding:11px;
    clip-path:polygon(0 0, calc(100% - 10px) 0, 100% 10px, 100% 100%, 10px 100%, 0 calc(100% - 10px)); }
  .stat .v{ font-family:var(--mono); font-weight:800; line-height:1.1; margin-top:5px; color:var(--text); }
  .bars{ display:flex; align-items:flex-end; gap:10px; height:140px; padding-top:8px; }
  .barcol{ flex:1; display:flex; flex-direction:column; align-items:center; gap:6px; height:100%; justify-content:flex-end; }
  .bar{ width:100%; max-width:38px; background:linear-gradient(180deg, var(--gold), var(--crimson)); min-height:2px;
    box-shadow:0 0 8px rgba(229,29,52,.4); }
  .barlabel{ font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:.05em; font-family:var(--mono); }
  .barval{ font-family:var(--mono); font-size:11px; color:var(--gold); font-weight:700; }

  .seg{ display:flex; border:1px solid var(--line); overflow:hidden; flex:0 0 auto; }
  .seg button{ font-family:var(--disp); text-transform:uppercase; letter-spacing:.06em; font-size:9px; font-weight:900; padding:5px 9px; color:var(--muted); }

  .focus-inp{ background:transparent; border:none; outline:none; color:var(--text); font-size:16px; font-weight:700; width:100%; }
  .ex{ background:var(--panel2); border:1px solid var(--line); padding:10px; }
  .ex .name{ background:transparent; border:none; outline:none; color:var(--text); font-size:14px; font-weight:600; width:100%; }
  .sr{ background:#0a0709; border:1px solid var(--line); padding:6px 8px; display:flex; align-items:center; gap:4px; }
  .sr input{ background:transparent; border:none; outline:none; color:var(--text); font-family:var(--mono); font-weight:700; }
  .move{ color:var(--muted); padding:4px; font-size:16px; line-height:1; }
  .move:disabled{ color:var(--line); }

  .toast{ position:fixed; left:50%; bottom:96px; transform:translateX(-50%); background:linear-gradient(180deg,var(--gold),#d4912a);
    color:#1a0d0d; font-family:var(--disp); font-weight:900; text-transform:uppercase; letter-spacing:.04em; font-size:13px;
    padding:9px 18px; z-index:40; box-shadow:0 0 18px rgba(241,178,62,.5); opacity:0; pointer-events:none; transition:opacity .2s;
    clip-path:polygon(0 0, calc(100% - 10px) 0, 100% 100%, 10px 100%); }
  .toast.show{ opacity:1; }

  nav{ position:fixed; bottom:0; left:50%; transform:translateX(-50%); width:100%; max-width:480px; z-index:30;
    background:linear-gradient(180deg,#120c10,#0a0709); border-top:2px solid var(--crimson-deep); padding-bottom:env(safe-area-inset-bottom); }
  nav .tabs{ display:grid; grid-template-columns:repeat(6,1fr); }
  nav button{ position:relative; display:flex; flex-direction:column; align-items:center; gap:3px; padding:10px 0 8px; color:var(--muted); }
  nav button.on{ color:var(--gold); }
  nav button.on::before{ content:""; position:absolute; top:0; left:20%; right:20%; height:3px; background:var(--crimson); box-shadow:0 0 8px var(--crimson); }
  nav .ic{ width:21px; height:21px; }
  nav .tl{ font-family:var(--disp); text-transform:uppercase; letter-spacing:.03em; font-size:8.5px; font-weight:900; }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="brand">
      <div class="seal">鉄</div>
      <div>
        <div class="logo">IRON<span class="dot">·</span><b>TRUNKS</b></div>
        <div class="sub" id="todayLabel"></div>
      </div>
    </div>
    <div style="text-align:right">
      <div class="label" style="color:var(--gold)">OFFLINE</div>
      <div class="mono" style="font-size:11px;color:var(--muted)">鉄 ON DEVICE</div>
    </div>
  </header>
  <main id="main"></main>
  <div class="toast" id="toast"></div>
  <nav><div class="tabs" id="nav"></div></nav>
  <input type="file" id="importFile" accept="application/json,.json" style="display:none" />
</div>

<script>
/* ============================== DATA ============================== */
const TARGETS = { p:190, c:250, f:70, s:60, sa:27, k:2400 };
const MEALS = ["Breakfast","Lunch","Dinner","Snack"];
const FOOD_GROUPS = ["Protein","Carb","Veg & Fruit","Fat & Nuts","Dairy","Sauce"];
const FOODS = [
  ["Chicken breast","Protein","g",100,23,0,1.5,0,0.4,108],["Chicken tender","Protein","g",100,23,0,0.8,0,0.2,98],
  ["Chicken thigh","Protein","g",100,19,0,5,0,1.4,127],["Beef round","Protein","g",100,21,0.5,10,0,3.8,182],
  ["Salmon","Protein","g",100,22,0.1,4.5,0,1,133],["Cod","Protein","g",100,17.6,0.1,0.2,0,0.05,77],
  ["Sardines (can)","Protein","can",1,20,0.3,11,0,3,190],["Tuna (can)","Protein","can",1,13,0.2,0.7,0,0.2,60],
  ["Mackerel (can)","Protein","can",1,26,0.6,19,0,5,290],["Egg","Protein","egg",1,6.2,0.2,5.2,0.2,1.6,71],
  ["Natto","Protein","pack",1,7.4,5.4,4.5,1.8,0.8,90],["Firm tofu","Protein","g",100,7,1.5,4.5,0.4,0.8,73],
  ["Greek yogurt","Protein","cup",1,10,5,0,4,0,70],["Whey protein","Protein","scoop",1,21,2.5,1.5,1,0.8,110],
  ["SAVAS milk protein","Protein","bottle",1,15,10,0,8,0,100],["Protein bar","Protein","bar",1,16,13,9,7,5,200],
  ["White rice (dry)","Carb","g",100,6.1,77.1,0.9,0,0.3,356],["Brown rice (dry)","Carb","g",100,6.8,71,2.7,0.8,0.6,346],
  ["Oats (dry)","Carb","g",100,13,68,7,1,1.2,380],["Bread","Carb","slice",1,5.6,28,2.6,3,0.6,158],
  ["Pasta (dry)","Carb","g",100,13,71,2,2.5,0.4,350],["Sweet potato","Carb","g",100,1.2,32,0.2,9,0.05,132],
  ["Potato","Carb","g",100,1.6,17,0.1,0.8,0,76],["Banana","Carb","banana",1,1.1,22.5,0.2,12,0.07,89],
  ["Broccoli","Veg & Fruit","g",100,3.7,5.2,0.5,1.5,0.1,33],["Cabbage","Veg & Fruit","g",100,1.3,5,0.2,3.5,0,23],
  ["Spinach","Veg & Fruit","g",100,2.2,3,0.4,0.4,0.1,20],["Cherry tomato","Veg & Fruit","g",100,1.1,7,0.1,5,0,30],
  ["Olive oil","Fat & Nuts","tbsp",1,0,0,12,0,1.7,106],["Almonds","Fat & Nuts","g",30,6,6.5,15,1.2,1.1,180],
  ["Peanut butter","Fat & Nuts","tbsp",1,4,3.5,8,2,1.7,95],["Milk","Dairy","ml",200,6.8,10,7.6,10,5,134],
  ["Cheese slice","Dairy","slice",1,4,0.3,4.7,0.2,3,60],["Ketchup","Sauce","tbsp",1,0.2,4,0,3.5,0,18],
  ["Mayonnaise","Sauce","tbsp",1,0.3,0.4,8.3,0.1,0.9,75],["Soy sauce","Sauce","tbsp",1,1.4,1.8,0,0.1,0,13],
  ["Yakiniku sauce","Sauce","tbsp",1,0.5,6,0.1,5,0,30],
].map(a => ({ n:a[0], g:a[1], u:a[2], q:a[3], p:a[4], c:a[5], f:a[6], s:a[7], sa:a[8], k:a[9] }));
const FOOD_BY_NAME = Object.fromEntries(FOODS.map(x => [x.n, x]));
function customAsFood(cf){ return { n:cf.n, g:"My Foods", u:"serving", q:1, p:cf.p, c:cf.c, f:cf.f, s:cf.s, sa:cf.sa, k:cf.k, custom:true, id:cf.id }; }
function resolveFood(name){ if(FOOD_BY_NAME[name]) return FOOD_BY_NAME[name]; for(var i=0;i<state.customFoods.length;i++){ if(state.customFoods[i].n===name) return customAsFood(state.customFoods[i]); } return null; }

function E(name, sets, reps){ return { id:uid(), name, sets, reps }; }
function makeDefaultPlan(){
  return [
    { id:uid(), name:"Day 1", focus:"Back & Rear Delts · width", type:"lift", note:"", exercises:[
      E("Pull-ups (or assisted)","4","6-8"), E("Lat Pulldown (wide grip)","3","10-12"),
      E("Chest-Supported Row","4","8-10"), E("Straight-Arm Pulldown","3","12-15"),
      E("Rear Delt Flyes","3","15-20"), E("Face Pulls","3","15") ] },
    { id:uid(), name:"Day 2", focus:"Shoulders & Chest", type:"lift", note:"", exercises:[
      E("Overhead Press","4","6-8"), E("Lateral Raises","4","12-20"),
      E("Incline Press","3","8-10"), E("Cable Lateral Raise","3","15-20"),
      E("Rear Delt Flyes","3","15") ] },
    { id:uid(), name:"Day 3", focus:"Conditioning", type:"conditioning", note:"Intervals / HIIT / bike · 20-30 min", exercises:[] },
    { id:uid(), name:"Day 4", focus:"Arms, Forearms & Core", type:"lift", note:"", exercises:[
      E("EZ-Bar Curl","4","8-10"), E("Hammer Curls","3","12"),
      E("Close-Grip Bench / Dips","4","8-10"), E("Cable Triceps Pushdown","3","12-15"),
      E("Wrist Curls","3","15"), E("Cable Woodchops","3","12/side"),
      E("Hanging Leg Raises","3","12") ] },
    { id:uid(), name:"Day 5", focus:"Legs & Back (secondary)", type:"lift", note:"", exercises:[
      E("Squat","3","6-8"), E("Romanian Deadlift","3","8-10"),
      E("Walking Lunges","3","12/leg"), E("Calf Raises","4","12-15"),
      E("Lat Pulldown","3","12"), E("Lateral Raises","3","15-20") ] },
    { id:uid(), name:"Day 6", focus:"Conditioning", type:"conditioning", note:"Incline walk / steady cardio · 30-40 min", exercises:[] },
    { id:uid(), name:"Day 7", focus:"Rest", type:"rest", note:"Full rest", exercises:[] },
  ];
}

/* ============================== STORAGE ============================== */
const K = { w:"il.workoutLog", f:"il.foodLog", b:"il.weightLog", p:"il.trainingPlan", cf:"il.customFoods", ce:"il.customExercises" };
function load(key, fb){ try{ const v=localStorage.getItem(key); return v ? JSON.parse(v) : fb; }catch(e){ return fb; } }
function save(key, val){ try{ localStorage.setItem(key, JSON.stringify(val)); }catch(e){ console.error("save failed", e); } }

/* ============================== HELPERS ============================== */
function pad2(n){ return String(n).padStart(2,"0"); }
function dstr(d){ return d.getFullYear()+"-"+pad2(d.getMonth()+1)+"-"+pad2(d.getDate()); }
const TODAY = dstr(new Date());
function daysAgo(n){ return dstr(new Date(Date.now()-n*864e5)); }
function uid(){ return Math.random().toString(36).slice(2,9); }
function r1(n){ return Math.round(n*10)/10; }
function md(s){ const a=s.split("-"); return a[1]+"/"+a[2]; }
function esc(s){ return String(s==null?"":s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }

/* ============================== STATE ============================== */
const state = {
  tab:"home",
  wlog: load(K.w, []),
  flog: load(K.f, []),
  blog: load(K.b, []),
  plan: (function(){ const p=load(K.p, null); return (Array.isArray(p) && p.length) ? p : makeDefaultPlan(); })(),
  trainDay:null, trainEx:null, eatMeal:"Breakfast", eatFood:FOODS[0].n, eatMode:"list", trainMode:"list", trainCustomName:"",
  customFoods: load(K.cf, []),
  customExercises: load(K.ce, []),
};
save(K.p, state.plan); // lock in default on first run

let toastTimer=null;
function toast(msg){ const t=document.getElementById("toast"); t.textContent=msg; t.classList.add("show");
  if(toastTimer) clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove("show"),1300); }

/* ============================== APP ACTIONS ============================== */
const App = {
  setTab(t){ state.tab=t; render(); },

  /* ---- TRAIN ---- */
  liftDays(){ return state.plan.filter(d=>d.type==="lift"); },
  currentDay(){ const ld=App.liftDays(); return ld.find(d=>d.id===state.trainDay) || ld[0]; },
  setTrainDay(id){ state.trainDay=id; const d=App.currentDay(); const names=d?d.exercises.map(e=>e.name).filter(Boolean):[]; state.trainEx=names[0]||null; render(); },
  setTrainEx(name){ state.trainEx=name; render(); },
  logSet(){
    const d=App.currentDay(); if(!d) return;
    const w=parseFloat(document.getElementById("tw").value);
    const rp=parseInt(document.getElementById("tr").value,10);
    const ex=state.trainEx;
    if(!ex || !(w>=0) || !(rp>0)){ toast("Enter weight & reps"); return; }
    state.wlog.push({ id:uid(), date:TODAY, day:d.name, focus:d.focus, exercise:ex, weight:w, reps:rp });
    save(K.w, state.wlog); toast("Set logged"); render();
  },
  delSet(id){ state.wlog=state.wlog.filter(x=>x.id!==id); save(K.w,state.wlog); render(); },
  setTrainMode(m){ state.trainMode=m; render(); },
  setTrainCustomName(v){ state.trainCustomName=v; },
  logCustomSet(){
    const d=App.currentDay(); if(!d) return;
    const name=(document.getElementById("cExName").value||"").trim();
    const w=parseFloat(document.getElementById("tw").value);
    const rp=parseInt(document.getElementById("tr").value,10);
    const saveIt=document.getElementById("cExSave").checked;
    if(!name || !(w>=0) || !(rp>0)){ toast("Enter exercise, weight & reps"); return; }
    state.wlog.push({ id:uid(), date:TODAY, day:d.name, focus:d.focus, exercise:name, weight:w, reps:rp });
    save(K.w,state.wlog);
    if(saveIt && !state.customExercises.some(x=>x.n.toLowerCase()===name.toLowerCase())){
      state.customExercises.push({ id:uid(), n:name }); save(K.ce,state.customExercises);
    }
    toast(saveIt?"Logged & saved":"Set logged"); render();
  },
  delCustomExercise(id){ state.customExercises=state.customExercises.filter(x=>x.id!==id); save(K.ce,state.customExercises); render(); },

  /* ---- PLAN ---- */
  savePlanSoon(){ if(App._pt) clearTimeout(App._pt); App._pt=setTimeout(()=>save(K.p,state.plan),400); },
  editFocus(id,v){ const d=state.plan.find(x=>x.id===id); if(d){ d.focus=v; App.savePlanSoon(); } },
  editNote(id,v){ const d=state.plan.find(x=>x.id===id); if(d){ d.note=v; App.savePlanSoon(); } },
  editEx(did,eid,field,v){ const d=state.plan.find(x=>x.id===did); if(!d)return; const e=d.exercises.find(x=>x.id===eid); if(e){ e[field]=v; App.savePlanSoon(); } },
  addEx(did){ const d=state.plan.find(x=>x.id===did); if(d){ d.exercises.push({id:uid(),name:"",sets:"3",reps:""}); save(K.p,state.plan); render(); } },
  delEx(did,eid){ const d=state.plan.find(x=>x.id===did); if(d){ d.exercises=d.exercises.filter(e=>e.id!==eid); save(K.p,state.plan); render(); } },
  moveEx(did,eid,dir){ const d=state.plan.find(x=>x.id===did); if(!d)return; const i=d.exercises.findIndex(e=>e.id===eid), j=i+dir;
    if(i<0||j<0||j>=d.exercises.length)return; const a=d.exercises; const t=a[i]; a[i]=a[j]; a[j]=t; save(K.p,state.plan); render(); },
  setType(did,type){ const d=state.plan.find(x=>x.id===did); if(d){ d.type=type; save(K.p,state.plan); render(); } },
  resetPlan(){ if(!confirm("Reset the program to the default? This wipes your plan edits (logged sets, food and weight are NOT affected).")) return;
    state.plan=makeDefaultPlan(); save(K.p,state.plan); state.trainDay=null; state.trainEx=null; toast("Reset to default"); render(); },

  /* ---- EAT ---- */
  setMeal(m){ state.eatMeal=m; render(); },
  setFood(n){ state.eatFood=n; render(); },
  addFood(){ const fo=resolveFood(state.eatFood); const a=parseFloat(document.getElementById("amt").value);
    if(!fo || !(a>0)){ toast("Enter an amount"); return; }
    const fac=a/fo.q;
    state.flog.push({ id:uid(), date:TODAY, meal:state.eatMeal, name:fo.n, amount:a, unit:fo.u,
      p:fo.p*fac, c:fo.c*fac, f:fo.f*fac, s:fo.s*fac, sa:fo.sa*fac, k:fo.k*fac });
    save(K.f,state.flog); toast("Added to "+state.eatMeal); render();
  },
  delFood(id){ state.flog=state.flog.filter(x=>x.id!==id); save(K.f,state.flog); render(); },
  setEatMode(m){ state.eatMode=m; render(); },
  addCustom(){
    const name=(document.getElementById("cName").value||"").trim();
    const p=parseFloat(document.getElementById("cP").value)||0;
    const c=parseFloat(document.getElementById("cC").value)||0;
    const f=parseFloat(document.getElementById("cF").value)||0;
    const kIn=parseFloat(document.getElementById("cK").value)||0;
    const saveIt=document.getElementById("cSave").checked;
    if(!name || (kIn<=0 && p<=0 && c<=0 && f<=0)){ toast("Add a name and at least one value"); return; }
    const k = kIn>0 ? kIn : Math.round((4*p)+(4*c)+(9*f));
    state.flog.push({ id:uid(), date:TODAY, meal:state.eatMeal, name:name, amount:1, unit:"serving", p:p, c:c, f:f, s:0, sa:0, k:k });
    save(K.f,state.flog);
    if(saveIt && !state.customFoods.some(x=>x.n.toLowerCase()===name.toLowerCase())){
      state.customFoods.push({ id:uid(), n:name, p:p, c:c, f:f, s:0, sa:0, k:k }); save(K.cf,state.customFoods);
    }
    toast(saveIt?"Logged & saved":"Added to "+state.eatMeal); render();
  },
  delCustomFood(id){ state.customFoods=state.customFoods.filter(x=>x.id!==id); save(K.cf,state.customFoods);
    if(!resolveFood(state.eatFood)) state.eatFood=FOODS[0].n; render(); },

  /* ---- BODY ---- */
  saveWeight(){ const v=parseFloat(document.getElementById("kg").value); if(!(v>0)){ toast("Enter your weight"); return; }
    state.blog=state.blog.filter(x=>x.date!==TODAY).concat([{date:TODAY,kg:v}]).sort((a,b)=>a.date.localeCompare(b.date));
    save(K.b,state.blog); toast("Weight saved"); render(); },

  /* ---- DATA ---- */
  exportData(){
    const payload={ app:"IronTrunks", version:2, exportedAt:new Date().toISOString(),
      workoutLog:state.wlog, foodLog:state.flog, weightLog:state.blog, trainingPlan:state.plan,
      customFoods:state.customFoods, customExercises:state.customExercises };
    const blob=new Blob([JSON.stringify(payload,null,2)],{type:"application/json"});
    const url=URL.createObjectURL(blob); const a=document.createElement("a");
    a.href=url; a.download="irontrunks-backup-"+TODAY+".json"; document.body.appendChild(a); a.click();
    setTimeout(()=>{ URL.revokeObjectURL(url); a.remove(); },200); toast("Backup downloaded");
  },
  triggerImport(){ document.getElementById("importFile").click(); },
  importData(file){
    const reader=new FileReader();
    reader.onload=()=>{ try{
      const d=JSON.parse(reader.result);
      if(!confirm("Restore from this backup? It replaces everything currently in the app.")) return;
      state.wlog=Array.isArray(d.workoutLog)?d.workoutLog:[];
      state.flog=Array.isArray(d.foodLog)?d.foodLog:[];
      state.blog=Array.isArray(d.weightLog)?d.weightLog:[];
      state.plan=(Array.isArray(d.trainingPlan)&&d.trainingPlan.length)?d.trainingPlan:makeDefaultPlan();
      state.customFoods=Array.isArray(d.customFoods)?d.customFoods:[];
      state.customExercises=Array.isArray(d.customExercises)?d.customExercises:[];
      save(K.w,state.wlog); save(K.f,state.flog); save(K.b,state.blog); save(K.p,state.plan);
      save(K.cf,state.customFoods); save(K.ce,state.customExercises);
      state.trainDay=null; state.trainEx=null; toast("Backup restored"); render();
    }catch(e){ alert("That file could not be read as an IronTrunks backup."); } };
    reader.readAsText(file);
  },
};
window.App = App;

/* ============================== VIEWS ============================== */
function macroBar(label, eaten, target, limit){
  const pct = target ? Math.min(100,(eaten/target)*100) : 0;
  let cls="";
  if(limit) cls = eaten>target ? "over" : "good";
  else if(eaten>target*1.1) cls="over";
  else if(eaten>=target*0.9) cls="good";
  return '<div class="gauge-wrap"><div class="gauge-top">'
    + '<div class="gauge-name">'+label+'</div>'
    + '<div class="gauge-val"><b>'+Math.round(eaten)+'</b><span class="t"> / '+target+(limit?" max":"")+'</span></div></div>'
    + '<div class="gauge"><div class="gfill '+cls+'" style="width:'+pct+'%"></div></div></div>';
}
function emptyBox(t){ return '<div class="empty">'+esc(t)+'</div>'; }

function banner(t, jp){ return '<div class="banner"><span class="t">'+esc(t)+'</span>'+(jp?'<span class="jp">'+jp+'</span>':'')+'</div>'; }

function viewHome(){
  const day=App.currentDay();
  const todaySets=state.wlog.filter(s=>s.date===TODAY);
  const tf=state.flog.filter(e=>e.date===TODAY);
  const tot=tf.reduce((a,e)=>({p:a.p+e.p,c:a.c+e.c,f:a.f+e.f,k:a.k+e.k}),{p:0,c:0,f:0,k:0});
  const sorted=state.blog.slice().sort((a,b)=>b.date.localeCompare(a.date));
  const latest=sorted[0]?r1(sorted[0].kg):"—";
  const last7=state.blog.slice(-7);
  const avg=last7.length?r1(last7.reduce((a,x)=>a+x.kg,0)/last7.length):"—";

  const sessionCard = day
    ? '<section class="card stack-sm">'
      + '<div class="label">'+esc(day.name)+'</div>'
      + '<div style="font-size:17px;font-weight:700;color:var(--text)">'+esc(day.focus)+'</div>'
      + '<div class="note-muted">'+todaySets.length+' sets logged today</div>'
      + '<button class="btn" onclick="App.setTab(\'train\')">▶ Train</button>'
      + '</section>'
    : '<section class="card"><div class="note-muted">No lifting day set — open Plan.</div></section>';

  const macroCard = '<section class="card stack-sm">'
    + macroBar("Protein",tot.p,TARGETS.p,false)
    + macroBar("Carbs",tot.c,TARGETS.c,false)
    + macroBar("Fat",tot.f,TARGETS.f,false)
    + macroBar("Energy",tot.k,TARGETS.k,false)
    + '<button class="btn" onclick="App.setTab(\'eat\')">▶ Eat</button>'
    + '</section>';

  const bodyCard = '<div class="row2">'
    + '<div class="stat"><div class="label">Latest kg</div><div class="v" style="font-size:28px">'+latest+'</div></div>'
    + '<div class="stat"><div class="label">7-day avg</div><div class="v" style="font-size:28px;color:var(--gold)">'+avg+'</div></div></div>';

  const setsList = todaySets.length===0 ? emptyBox("Nothing logged yet today.")
    : '<div class="stack-sm">'+todaySets.slice().reverse().slice(0,6).map(s=>
        '<div class="item"><div class="min0"><div class="truncate" style="font-weight:600;font-size:14px">'+esc(s.exercise)+'</div>'
        +'<div class="note-muted">'+esc(s.day)+'</div></div>'
        +'<div class="mono" style="font-size:15px;font-weight:700;color:var(--gold);white-space:nowrap">'+s.weight+'kg × '+s.reps+'</div></div>').join("")+'</div>';

  return '<div class="stack">'
    + '<div>'+banner("Today's Session","本日の鍛錬")+sessionCard+'</div>'
    + '<div>'+banner("Nutrition","栄養ゲージ")+macroCard+'</div>'
    + '<div>'+banner("Body","体重")+bodyCard+'</div>'
    + '<div>'+banner("Logged Today","記録")+setsList+'</div>'
    + '</div>';
}

function viewTrain(){
  const ld=App.liftDays();
  if(ld.length===0){
    return '<div class="stack"><div class="label">Today\'s session</div>'
      + emptyBox("No lifting days in your plan. Open Plan to build one.")
      + '<button class="btn" onclick="App.setTab(\'plan\')">Go to Plan</button></div>';
  }
  const day=App.currentDay();
  const names=day.exercises.map(e=>e.name).filter(Boolean);
  const customNames=state.customExercises.map(e=>e.n);
  const allNames=names.concat(customNames);
  if(state.trainEx==null || !allNames.includes(state.trainEx)) state.trainEx=names[0]||customNames[0]||null;
  const exObj=day.exercises.find(e=>e.name===state.trainEx);
  const selectedExIsCustom=!names.includes(state.trainEx) && customNames.includes(state.trainEx);
  const hasAnyEx=names.length || customNames.length;
  const today=state.wlog.filter(s=>s.date===TODAY);

  let chips=ld.map(d=>'<button class="chip'+(d.id===day.id?' on':'')+'" onclick="App.setTrainDay(\''+d.id+'\')">'+esc(d.name)+'</button>').join("");

  let list = today.length===0 ? emptyBox("No sets yet. Pick an exercise and log your first.")
    : '<div class="stack-sm">'+today.slice().reverse().map(s=>
        '<div class="item"><div class="min0"><div class="truncate" style="font-weight:600;font-size:14px">'+esc(s.exercise)+'</div>'
        +'<div class="note-muted">'+esc(s.day)+'</div></div>'
        +'<div style="display:flex;align-items:center;gap:8px"><div class="mono" style="font-size:15px;font-weight:700;color:var(--teal);white-space:nowrap">'+s.weight+'kg × '+s.reps+'</div>'
        +'<button class="x" onclick="App.delSet(\''+s.id+'\')">×</button></div></div>').join("")+'</div>';

  return '<div class="stack">'
    + '<section>'+banner("Today's Session","本日の鍛錬")+'<div class="chips">'+chips+'</div>'
    + '<div style="margin-top:8px;font-size:13px;color:var(--muted)">'+esc(day.focus)+'</div></section>'
    + trainExCard(day, names, customNames, exObj, selectedExIsCustom, hasAnyEx)
    + '<section><div style="display:flex;align-items:baseline;justify-content:space-between"><div class="label">Logged today</div>'
    +   '<div class="mono" style="font-size:12px;color:var(--muted)">'+today.length+' sets</div></div>'+list+'</section>'
    + '</div>';
}
function trainExCard(day, names, customNames, exObj, selectedExIsCustom, hasAnyEx){
  const seg='<div style="display:flex;align-items:center;justify-content:space-between">'
    +'<div class="label">Exercise</div><div class="seg">'
    +'<button onclick="App.setTrainMode(\'list\')" style="'+(state.trainMode!=="custom"?"background:var(--teal);color:var(--ink)":"")+'">List</button>'
    +'<button onclick="App.setTrainMode(\'custom\')" style="'+(state.trainMode==="custom"?"background:var(--teal);color:var(--ink)":"")+'">Custom</button>'
    +'</div></div>';
  let exPart;
  if(state.trainMode==="custom"){
    exPart='<div class="field" style="margin-top:6px"><input id="cExName" value="'+esc(state.trainCustomName||"")+'" placeholder="e.g. Cable Crossover" oninput="App.setTrainCustomName(this.value)"></div>'
      +'<label style="display:flex;align-items:center;gap:8px;font-size:13px;color:var(--muted);margin-top:8px"><input type="checkbox" id="cExSave" style="width:16px;height:16px;accent-color:#2DD4BF"> Save to My Exercises for next time</label>';
  } else {
    const dayOpts=names.length?'<optgroup label="'+esc(day.name)+' plan">'+names.map(n=>'<option '+(n===state.trainEx?'selected':'')+'>'+esc(n)+'</option>').join("")+'</optgroup>':'';
    const myOpts=customNames.length?'<optgroup label="My Exercises">'+customNames.map(n=>'<option '+(n===state.trainEx?'selected':'')+'>'+esc(n)+'</option>').join("")+'</optgroup>':'';
    const cid=(state.customExercises.find(e=>e.n===state.trainEx)||{}).id;
    exPart=hasAnyEx
      ? '<div class="field" style="margin-top:6px"><select onchange="App.setTrainEx(this.value)">'+dayOpts+myOpts+'</select></div>'
        +(exObj?'<div class="hint">Target · '+esc(exObj.sets)+' × '+esc(exObj.reps)+'</div>':'')
        +(selectedExIsCustom?'<button onclick="App.delCustomExercise(\''+cid+'\')" style="background:none;color:var(--muted);font-size:12px;text-decoration:underline;text-align:left;margin-top:6px">Remove “'+esc(state.trainEx)+'” from My Exercises</button>':'')
      : '<div style="color:var(--muted);font-size:14px;margin-top:6px">No exercises here — add them in Plan, or use Custom above.</div>';
  }
  const logBtn=state.trainMode==="custom"
    ? '<button class="btn" onclick="App.logCustomSet()">+ Log set</button>'

  return '<section class="card stack-sm">'+seg+exPart

    +   macroBar("Fat g",tot.f,TARGETS.f,false)
    +   macroBar("Energy kcal",tot.k,TARGETS.k,false)
    +   '<div class="row2" style="padding-top:4px">'
    +     miniLimit("Sugars",tot.s,TARGETS.s)+miniLimit("Sat fat",tot.sa,TARGETS.sa)+'</div>'
    + '</section>'
    + eatFoodCard(fo, foodOpts, selectedIsCustom)
    + '<section><div class="label">Eaten today</div><div style="margin-top:8px">'+list+'</div></section>'
    + '</div>';
}
function eatFoodCard(fo, foodOpts, selectedIsCustom){
  const seg='<div style="display:flex;align-items:center;justify-content:space-between">'
    +'<div class="label">Add food</div><div class="seg">'
    +'<button onclick="App.setEatMode(\'list\')" style="'+(state.eatMode!=="custom"?"background:var(--teal);color:var(--ink)":"")+'">List</button>'
    +'<button onclick="App.setEatMode(\'custom\')" style="'+(state.eatMode==="custom"?"background:var(--teal);color:var(--ink)":"")+'">Custom</button>'
    +'</div></div>';
  let body;
  if(state.eatMode==="custom"){
    body='<div><div class="label">Name</div><div class="field" style="margin-top:6px"><input id="cName" placeholder="e.g. Work dinner — yakiniku"></div></div>'
      +'<div class="row2"><div><div class="label">Calories</div><div class="field" style="margin-top:6px"><input id="cK" class="inp-num" inputmode="decimal" placeholder="600"></div></div>'
      +'<div><div class="label">Protein g</div><div class="field" style="margin-top:6px"><input id="cP" class="inp-num" inputmode="decimal" placeholder="40"></div></div></div>'
      +'<div class="row2"><div><div class="label">Carbs g</div><div class="field" style="margin-top:6px"><input id="cC" class="inp-num" inputmode="decimal" placeholder="50"></div></div>'
      +'<div><div class="label">Fat g</div><div class="field" style="margin-top:6px"><input id="cF" class="inp-num" inputmode="decimal" placeholder="20"></div></div></div>'
      +'<div style="font-size:11px;color:var(--muted)">Leave calories blank to auto-calc from the macros.</div>'
      +'<label style="display:flex;align-items:center;gap:8px;font-size:13px;color:var(--muted)"><input type="checkbox" id="cSave" style="width:16px;height:16px;accent-color:#2DD4BF"> Save to My Foods for next time</label>'
      +'<button class="btn" onclick="App.addCustom()">+ Add to '+state.eatMeal+'</button>';
  } else {
    body='<div><div class="label">Food</div><div class="field" style="margin-top:6px"><select onchange="App.setFood(this.value)">'+foodOpts+'</select></div></div>'
      +'<div><div class="label">Amount · '+esc(fo.u)+'</div><div class="field" style="margin-top:6px"><input id="amt" class="inp-num" inputmode="decimal" placeholder="'+(fo.u==="g"?"200":"1")+'"></div></div>'
      +(selectedIsCustom?'<button onclick="App.delCustomFood(\''+fo.id+'\')" style="background:none;color:var(--muted);font-size:12px;text-decoration:underline;text-align:left">Remove “'+esc(fo.n)+'” from My Foods</button>':'')
      +'<button class="btn" onclick="App.addFood()">+ Add to '+state.eatMeal+'</button>';
  }
  return '<section class="card stack-sm">'+seg+body+'</section>';
}
function miniLimit(label,eaten,target){ const over=eaten>target;
  return '<div style="background:var(--panel2);border:1px solid '+(over?'var(--red)':'var(--line)')+';border-radius:12px;padding:8px 12px;display:flex;align-items:baseline;justify-content:space-between">'
    +'<div class="label">'+label+'</div><div class="mono" style="font-size:13px;font-weight:700;color:'+(over?'var(--red)':'var(--green)')+'">'+Math.round(eaten)
    +'<span style="color:var(--muted);font-weight:400">/'+target+'</span></div></div>';
}

function viewBody(){
  const sorted=state.blog.slice().sort((a,b)=>b.date.localeCompare(a.date));
  const last7=state.blog.slice(-7);
  const avg=last7.length?r1(last7.reduce((a,x)=>a+x.kg,0)/last7.length):"—";
  const latest=sorted[0]?r1(sorted[0].kg):"—";
  let recent = sorted.length===0 ? emptyBox("No weigh-ins yet. Log today to start the trend.")
    : '<div class="stack-sm">'+sorted.slice(0,10).map(x=>'<div class="item"><div class="mono" style="font-size:12px;color:var(--muted)">'+x.date+'</div><div class="mono" style="font-size:15px;font-weight:700">'+r1(x.kg)+' kg</div></div>').join("")+'</div>';
  return '<div class="stack">'
    + '<div class="row2"><div class="stat"><div class="label">Latest kg</div><div class="v" style="font-size:30px">'+latest+'</div></div>'
    +   '<div class="stat"><div class="label">7-day avg</div><div class="v" style="font-size:30px;color:var(--teal)">'+avg+'</div></div></div>'
    + '<section class="card stack-sm">'
    +   '<div><div class="label">Today\'s weigh-in · kg</div><div class="field" style="margin-top:6px"><input id="kg" class="inp-num" style="font-size:20px" inputmode="decimal" placeholder="85.0" value="'+(state.blog.find(x=>x.date===TODAY)?state.blog.find(x=>x.date===TODAY).kg:"")+'"></div></div>'
    +   '<button class="btn" onclick="App.saveWeight()">Save today\'s weight</button>'
    +   '<div class="note-muted">Best first thing, after the toilet, before food.</div>'
    + '</section>'
    + '<section><div class="label">Recent</div><div style="margin-top:8px">'+recent+'</div></section>'
    + '</div>';
}

function weightSVG(){
  const data=state.blog.slice().sort((a,b)=>a.date.localeCompare(b.date));
  if(data.length===0) return emptyBox("Weigh in on the Body tab to start the trend.");
  const W=320,H=170,pad=26;
  const pts=data.map((x,i)=>{ const win=data.slice(Math.max(0,i-6),i+1); return {kg:x.kg, avg:win.reduce((a,w)=>a+w.kg,0)/win.length, lbl:md(x.date)}; });
  const ys=pts.reduce((a,p)=>a.concat([p.kg,p.avg]),[]); let mn=Math.min.apply(null,ys), mx=Math.max.apply(null,ys);
  if(mn===mx){ mn-=1; mx+=1; } mn-=0.4; mx+=0.4;
  const X=i=> pad + (pts.length===1?(W-2*pad)/2:i*(W-2*pad)/(pts.length-1));
  const Y=v=> H-pad - (v-mn)/(mx-mn)*(H-2*pad);
  function poly(key,col,wd){ return '<polyline fill="none" stroke="'+col+'" stroke-width="'+wd+'" stroke-linejoin="round" points="'+pts.map((p,i)=>X(i)+','+Y(p[key])).join(" ")+'"/>'; }
  const grid='<line x1="'+pad+'" y1="'+(H-pad)+'" x2="'+(W-pad)+'" y2="'+(H-pad)+'" stroke="#2A3742"/>'
    +'<text x="2" y="'+(Y(mx)+4)+'" fill="#8696A5" font-size="10" font-family="monospace">'+r1(mx)+'</text>'
    +'<text x="2" y="'+(Y(mn)+4)+'" fill="#8696A5" font-size="10" font-family="monospace">'+r1(mn)+'</text>';
  const lbls='<text x="'+X(0)+'" y="'+(H-8)+'" fill="#8696A5" font-size="9" font-family="monospace">'+pts[0].lbl+'</text>'
    +(pts.length>1?'<text x="'+(W-pad)+'" y="'+(H-8)+'" text-anchor="end" fill="#8696A5" font-size="9" font-family="monospace">'+pts[pts.length-1].lbl+'</text>':'');
  return '<svg viewBox="0 0 '+W+' '+H+'" width="100%" height="'+H+'" preserveAspectRatio="xMidYMid meet">'+grid+poly("kg","#8696A5",1.4)+poly("avg","#2DD4BF",2.6)+lbls+'</svg>';
}

function viewStats(){
  const cut=daysAgo(6);
  const recent=state.wlog.filter(s=>s.date>=cut);
  const by={}; recent.forEach(s=>{ by[s.day]=(by[s.day]||0)+1; });
  const days=Object.keys(by).sort(); const maxV=days.length?Math.max.apply(null,days.map(d=>by[d])):0;
  const weekSets=recent.length;
  const weekSessions=new Set(recent.map(s=>s.date+s.day)).size;
  const kToday=Math.round(state.flog.filter(e=>e.date===TODAY).reduce((a,e)=>a+e.k,0));

  let bars = days.length===0 ? emptyBox("Log a few sets to see your volume build.")
    : '<div class="bars">'+days.map(d=>{ const h=Math.round((by[d]/maxV)*120);
        return '<div class="barcol"><div class="barval">'+by[d]+'</div><div class="bar" style="height:'+h+'px"></div><div class="barlabel">'+esc(d.replace("Day ","D"))+'</div></div>';
      }).join("")+'</div>';

  return '<div class="stack">'
    + '<div class="row3">'
    +   '<div class="stat"><div class="label">Sets · 7d</div><div class="v" style="font-size:24px">'+weekSets+'</div></div>'
    +   '<div class="stat"><div class="label">Sessions</div><div class="v" style="font-size:24px">'+weekSessions+'</div></div>'
    +   '<div class="stat"><div class="label">kcal today</div><div class="v" style="font-size:24px;color:var(--teal)">'+kToday+'</div></div>'
    + '</div>'
    + '<section class="card"><div class="label">Weekly volume · sets by day</div>'+bars+'</section>'
    + '<section class="card"><div class="label">Weight trend · kg & 7-day avg</div><div style="margin-top:8px">'+weightSVG()+'</div></section>'
    + '<section class="card stack-sm"><div class="label">Backup</div>'
    +   '<div style="font-size:13px;color:var(--muted)">Save a copy of all your data, or restore one. Do this before any app update.</div>'
    +   '<div class="row2"><button class="btn small" style="width:100%" onclick="App.exportData()">Export</button>'
    +     '<button class="btn small ghost" style="width:100%;color:var(--text)" onclick="App.triggerImport()">Import</button></div>'
    + '</section>'
    + '</div>';
}

/* ============================== RENDER ============================== */
const TABS=[["home","Home"],["train","Train"],["plan","Plan"],["eat","Eat"],["body","Body"],["stats","Stats"]];
const ICONS={
  home:'<svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10.5 12 3l9 7.5"/><path d="M5 9.5V21h14V9.5"/><path d="M9.5 21v-6h5v6"/></svg>',
  train:'<svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.4 14.4 9.6 9.6"/><path d="M18.657 21.485a2 2 0 1 1-2.829-2.828l-1.767 1.768a2 2 0 1 1-2.829-2.829l6.364-6.364a2 2 0 1 1 2.829 2.829l-1.768 1.767a2 2 0 1 1 2.828 2.829z"/><path d="m21.5 21.5-1.4-1.4"/><path d="M3.9 3.9 2.5 2.5"/><path d="M6.404 12.768a2 2 0 1 1-2.829-2.829l1.768-1.767a2 2 0 1 1-2.828-2.829l2.828-2.828a2 2 0 1 1 2.829 2.828l1.767-1.768a2 2 0 1 1 2.829 2.829z"/></svg>',
  plan:'<svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="8" height="4" x="8" y="2" rx="1"/><path d="M12 11h4"/><path d="M12 16h4"/><path d="M8 11h.01"/><path d="M8 16h.01"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/></svg>',
  eat:'<svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"/><path d="M7 2v20"/><path d="M21 15V2a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3Zm0 0v7"/></svg>',
  body:'<svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 7a4 4 0 1 1-8 0"/><path d="M3.5 21 8 7h8l4.5 14"/><path d="M2 21h20"/></svg>',
  stats:'<svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v16a2 2 0 0 0 2 2h16"/><path d="M18 17V9"/><path d="M13 17V5"/><path d="M8 17v-3"/></svg>',
};
function render(){
  document.getElementById("todayLabel").textContent=TODAY;
  const main=document.getElementById("main");
  if(state.tab==="home") main.innerHTML=viewHome();
  else if(state.tab==="train") main.innerHTML=viewTrain();
  else if(state.tab==="plan") main.innerHTML=viewPlan();
  else if(state.tab==="eat") main.innerHTML=viewEat();
  else if(state.tab==="body") main.innerHTML=viewBody();
  else main.innerHTML=viewStats();
  document.getElementById("nav").innerHTML=TABS.map(t=>
    '<button class="'+(state.tab===t[0]?'on':'')+'" onclick="App.setTab(\''+t[0]+'\')">'+ICONS[t[0]]+'<span class="tl">'+t[1]+'</span></button>').join("");
}

document.getElementById("importFile").addEventListener("change", function(ev){
  const f=ev.target.files && ev.target.files[0]; if(f) App.importData(f); ev.target.value="";
});

/* init selections */
(function(){ const ld=state.plan.filter(d=>d.type==="lift"); if(ld[0]){ state.trainDay=ld[0].id; const n=ld[0].exercises.map(e=>e.name).filter(Boolean); state.trainEx=n[0]||null; } })();
render();

/* PWA: offline + persistence */
if("serviceWorker" in navigator){ window.addEventListener("load",()=>navigator.serviceWorker.register("./sw.js").catch(e=>console.warn("SW failed",e))); }
if(navigator.storage && navigator.storage.persist){ navigator.storage.persist().catch(()=>{}); }
</script>
