<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

<title>IronTrunks</title>
<link rel="manifest" href="./manifest.webmanifest" />
<link rel="apple-touch-icon" href="./icon-192.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />

<style>
  @font-face{ font-family:"IronDisp"; src:url("./display.woff") format("woff"); font-weight:400 900; font-style:normal; font-display:swap; }
  :root{
    --ink:#0C0A0D; --panel:#15111A; --panel2:#1E1722; --line:#3C2E36;
    --teal:#E51D34; --tealdim:#F1B23E; --text:#EDE6D6; --muted:#9C8F86;
    --amber:#F1B23E; --red:#FF5563; --green:#5BD46A;
    --gold:#F1B23E; --crimson:#E51D34; --crimson-deep:#8E1020;
    --mono: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    --disp: "IronDisp","Arial Black",Roboto,sans-serif;
  }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ margin:0; padding:0; background:#000; color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; }
  body{ max-width:480px; margin:0 auto; min-height:100vh;
    background:radial-gradient(120% 80% at 50% -8%, #1c0d12 0%, var(--ink) 55%), var(--ink); }
  body::after{ content:""; position:fixed; inset:0; pointer-events:none; z-index:60;
    background:repeating-linear-gradient(rgba(0,0,0,0) 0 2px, rgba(0,0,0,.14) 2px 3px); mix-blend-mode:multiply; }
  body::before{ content:""; position:fixed; inset:0; pointer-events:none; z-index:59;
    box-shadow:inset 0 0 130px 28px rgba(0,0,0,.7); }
  button{ font-family:inherit; cursor:pointer; border:none; background:none; color:inherit; }
  input,select{ font-family:inherit; }
  .mono{ font-family:var(--mono); font-variant-numeric:tabular-nums; }
  .app{ position:relative; min-height:100vh; z-index:1; }

  header{ display:flex; align-items:center; justify-content:space-between; padding:16px 16px 10px; }
  .brand{ display:flex; align-items:center; gap:11px; }
  .seal{ flex:0 0 auto; width:44px; height:44px; border-radius:50%; display:grid; place-items:center;
    color:var(--text); font-size:23px; font-weight:700; transform:rotate(-6deg);
    background:radial-gradient(circle at 35% 30%, #c0162a, #7c0d1c); border:2px solid var(--gold);
    box-shadow:0 0 13px rgba(229,29,52,.5), inset 0 0 8px rgba(0,0,0,.5); text-shadow:0 1px 2px rgba(0,0,0,.6); }
  .logo{ font-family:var(--disp); font-weight:900; font-size:26px; line-height:.9; transform:skewX(-8deg);
    letter-spacing:-.01em; text-transform:uppercase; color:var(--text);
    text-shadow:2px 2px 0 var(--crimson-deep), 4px 4px 0 rgba(0,0,0,.4); }
  .logo .dot{ color:var(--gold); }
  .logo b{ color:var(--crimson); font-weight:900; }
  .sub{ text-transform:uppercase; letter-spacing:.2em; font-size:10px; color:var(--muted); margin-top:4px; font-family:var(--mono); }
  main{ padding:0 16px 122px; }
  .stack > * + *{ margin-top:18px; }
  .stack-sm > * + *{ margin-top:11px; }

  .label{ font-family:var(--disp); font-weight:900; text-transform:uppercase; letter-spacing:.08em;
    font-size:11px; color:var(--gold); transform:skewX(-8deg); display:inline-block; }
  .note-muted{ text-transform:uppercase; letter-spacing:.14em; font-size:9.5px; color:var(--muted); font-family:var(--mono); }
  .hint{ text-transform:uppercase; letter-spacing:.08em; font-size:11px; color:var(--gold); margin-top:7px; font-family:var(--mono); }
  .hint b{ color:var(--crimson); }

  .banner{ position:relative; margin:0 0 10px; padding:9px 15px;
    background:repeating-linear-gradient(115deg, rgba(241,178,62,.12) 0 8px, transparent 8px 18px),
      linear-gradient(90deg, var(--crimson-deep), #4a0a14 70%, transparent);
    border-left:4px solid var(--crimson); clip-path:polygon(0 0, 100% 0, calc(100% - 15px) 100%, 0 100%); }
  .banner .t{ font-family:var(--disp); font-weight:900; font-size:15px; transform:skewX(-8deg); display:inline-block;
    text-transform:uppercase; letter-spacing:.04em; color:var(--text); text-shadow:1px 1px 0 rgba(0,0,0,.5); }
  .banner .jp{ font-family:var(--mono); font-size:10px; color:var(--gold); margin-left:8px; letter-spacing:.08em; }

  .card{ position:relative; background:linear-gradient(180deg, var(--panel), var(--ink)); border:1px solid var(--line);
    padding:15px; clip-path:polygon(0 0, calc(100% - 16px) 0, 100% 16px, 100% 100%, 16px 100%, 0 calc(100% - 16px)); }
  .card::before{ content:""; position:absolute; left:0; right:0; top:0; height:2px; background:rgba(241,178,62,.28); }

  .field{ background:#0a0709; border:1px solid var(--line); padding:10px 12px; }
  .field input, .field select{ background:transparent; color:var(--text); border:none; outline:none; width:100%; font-size:15px; }
  .inp-num{ font-family:var(--mono); font-size:18px; font-weight:700; color:var(--text); }
  .row2{ display:grid; grid-template-columns:1fr 1fr; gap:11px; }
  .row3{ display:grid; grid-template-columns:1fr 1fr 1fr; gap:11px; }

  .chips{ display:flex; gap:8px; flex-wrap:wrap; margin-top:8px; }
  .chip{ position:relative; padding:8px 14px; font-family:var(--disp); font-weight:900; font-size:13px;
    text-transform:uppercase; letter-spacing:.03em; color:var(--muted); background:var(--panel2);
    border:1px solid var(--line); clip-path:polygon(0 0, 100% 0, 100% 100%, 8px 100%, 0 calc(100% - 8px)); }
  .chip.on{ color:#1a0d0d; background:linear-gradient(180deg, var(--gold), #d4912a); border-color:var(--gold);
    box-shadow:0 0 12px rgba(241,178,62,.45); }

  .btn{ position:relative; width:100%; padding:14px; font-family:var(--disp); font-weight:900; font-size:16px;
    text-transform:uppercase; letter-spacing:.04em; color:#190a0a; overflow:hidden;
    background:linear-gradient(180deg,#ff3144,var(--crimson) 40%,#a81223); border:2px solid var(--gold);
    box-shadow:0 0 16px rgba(229,29,52,.45), inset 0 2px 0 rgba(255,255,255,.22);
    display:flex; align-items:center; justify-content:center; gap:8px;
    clip-path:polygon(0 0, calc(100% - 12px) 0, 100% 12px, 100% 100%, 12px 100%, 0 calc(100% - 12px)); }
  .btn::after{ content:""; position:absolute; inset:0; pointer-events:none;
    background:repeating-linear-gradient(115deg, rgba(255,255,255,.13) 0 6px, transparent 6px 16px); }
  .btn.ghost{ background:transparent; color:var(--muted); border:1px dashed var(--line); box-shadow:none; }
  .btn.ghost::after{ display:none; }
  .btn.tealtext{ background:transparent; color:var(--gold); border:1px dashed var(--line); font-size:13px; padding:10px; box-shadow:none; }
  .btn.tealtext::after{ display:none; }
  .btn.danger{ background:linear-gradient(180deg,#ff3144,var(--crimson) 40%,#a81223); }
  .btn.small{ padding:12px; font-size:14px; }

  .item{ background:var(--panel); border:1px solid var(--line); border-left:3px solid var(--crimson); padding:9px 13px;
    display:flex; align-items:center; justify-content:space-between; gap:12px; }
  .item .x{ color:var(--muted); padding:4px; flex:0 0 auto; font-size:18px; line-height:1; }
  .truncate{ overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .min0{ min-width:0; }
  .empty{ border:1px dashed var(--line); color:var(--muted); padding:22px 16px; text-align:center; font-size:14px; margin-top:8px; }

  .gauge-wrap{ margin-bottom:12px; }
  .gauge-top{ display:flex; justify-content:space-between; align-items:baseline; margin-bottom:5px; }
  .gauge-name{ font-family:var(--disp); font-weight:900; font-size:12px; transform:skewX(-8deg); display:inline-block;
    text-transform:uppercase; letter-spacing:.05em; color:var(--text); }
  .gauge-val{ font-family:var(--mono); font-size:12px; }
  .gauge-val b{ color:var(--text); font-weight:700; }
  .gauge-val .t{ color:var(--muted); }
  .gauge{ height:15px; background:#0a0709; border:1px solid var(--line); transform:skewX(-14deg); overflow:hidden;
    position:relative; box-shadow:inset 0 0 6px rgba(0,0,0,.7); }
  .gfill{ height:100%; position:relative; width:0; transition:width .45s cubic-bezier(.2,.8,.2,1);
    background:linear-gradient(90deg, var(--crimson), var(--gold)); }
  .gfill.good{ background:linear-gradient(90deg,#2fa84a,var(--green)); }
  .gfill.over{ background:linear-gradient(90deg,#a81223,var(--red)); }
  .gfill::after{ content:""; position:absolute; inset:0; background:repeating-linear-gradient(90deg, transparent 0 11px, rgba(0,0,0,.5) 11px 13px); }

  .stat{ position:relative; background:linear-gradient(180deg, var(--panel), var(--ink)); border:1px solid var(--line); padding:11px;
    clip-path:polygon(0 0, calc(100% - 10px) 0, 100% 10px, 100% 100%, 10px 100%, 0 calc(100% - 10px)); }
  .stat .v{ font-family:var(--mono); font-weight:800; line-height:1.1; margin-top:5px; color:var(--text); }
  .bars{ display:flex; align-items:flex-end; gap:10px; height:140px; padding-top:8px; }
  .barcol{ flex:1; display:flex; flex-direction:column; align-items:center; gap:6px; height:100%; justify-content:flex-end; }
  .bar{ width:100%; max-width:38px; background:linear-gradient(180deg, var(--gold), var(--crimson)); min-height:2px;
    box-shadow:0 0 8px rgba(229,29,52,.4); }
  .barlabel{ font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:.05em; font-family:var(--mono); }
  .barval{ font-family:var(--mono); font-size:11px; color:var(--gold); font-weight:700; }

  .seg{ display:flex; border:1px solid var(--line); overflow:hidden; flex:0 0 auto; }
  .seg button{ font-family:var(--disp); text-transform:uppercase; letter-spacing:.06em; font-size:9px; font-weight:900; padding:5px 9px; color:var(--muted); }

  .focus-inp{ background:transparent; border:none; outline:none; color:var(--text); font-size:16px; font-weight:700; width:100%; }
  .ex{ background:var(--panel2); border:1px solid var(--line); padding:10px; }
  .ex .name{ background:transparent; border:none; outline:none; color:var(--text); font-size:14px; font-weight:600; width:100%; }
  .sr{ background:#0a0709; border:1px solid var(--line); padding:6px 8px; display:flex; align-items:center; gap:4px; }
  .sr input{ background:transparent; border:none; outline:none; color:var(--text); font-family:var(--mono); font-weight:700; }
  .move{ color:var(--muted); padding:4px; font-size:16px; line-height:1; }
  .move:disabled{ color:var(--line); }

  .toast{ position:fixed; left:50%; bottom:96px; transform:translateX(-50%); background:linear-gradient(180deg,var(--gold),#d4912a);
    color:#1a0d0d; font-family:var(--disp); font-weight:900; text-transform:uppercase; letter-spacing:.04em; font-size:13px;
    padding:9px 18px; z-index:40; box-shadow:0 0 18px rgba(241,178,62,.5); opacity:0; pointer-events:none; transition:opacity .2s;
    clip-path:polygon(0 0, calc(100% - 10px) 0, 100% 100%, 10px 100%); }
  .toast.show{ opacity:1; }

  nav{ position:fixed; bottom:0; left:50%; transform:translateX(-50%); width:100%; max-width:480px; z-index:30;
    background:linear-gradient(180deg,#120c10,#0a0709); border-top:2px solid var(--crimson-deep); padding-bottom:env(safe-area-inset-bottom); }
  nav .tabs{ display:grid; grid-template-columns:repeat(6,1fr); }
  nav button{ position:relative; display:flex; flex-direction:column; align-items:center; gap:3px; padding:10px 0 8px; color:var(--muted); }
  nav button.on{ color:var(--gold); }
  nav button.on::before{ content:""; position:absolute; top:0; left:20%; right:20%; height:3px; background:var(--crimson); box-shadow:0 0 8px var(--crimson); }
  nav .ic{ width:21px; height:21px; }
  nav .tl{ font-family:var(--disp); text-transform:uppercase; letter-spacing:.03em; font-size:8.5px; font-weight:900; }
</style>
</head>

function kwOf(name){ return name.toLowerCase().replace(/\([^)]*\)/g," ").replace(/[^a-z0-9 ]/g," ").split(/\s+/).filter(w=>w.length>1); }
const FOOD_KW=FOODS.map(f=>({n:f.n,kw:kwOf(f.n)}));
function canonUnit(u){ u=u.toLowerCase();
  if(/^(grams?|grammes?|g)$/.test(u))return"g"; if(u==="kg")return"kg"; if(u==="ml")return"ml"; if(/^(l|litres?|liters?)$/.test(u))return"l";
  if(/^(tbsp|tablespoons?)$/.test(u))return"tbsp"; if(/^(tsp|teaspoons?)$/.test(u))return"tsp";
  if(/^(cups?)$/.test(u))return"cup"; if(/^(bowls?)$/.test(u))return"bowl"; if(/^(cans?)$/.test(u))return"can";
  if(/^(packs?|packets?)$/.test(u))return"pack"; if(/^(bottles?)$/.test(u))return"bottle"; if(/^(scoops?)$/.test(u))return"scoop";
  if(/^(bars?)$/.test(u))return"bar"; if(/^(slices?)$/.test(u))return"slice"; if(/^(pieces?|pcs?)$/.test(u))return"piece";
  if(/^(skewers?)$/.test(u))return"skewer"; if(/^(sheets?)$/.test(u))return"sheet"; if(/^(blocks?)$/.test(u))return"block";
  if(/^(handfuls?)$/.test(u))return"handful"; return u; }
function parseSeg(seg){
  let s=" "+seg.toLowerCase()+" ";
  s=s.replace(/グラム/g," g ").replace(/個/g," piece ").replace(/枚/g," slice ").replace(/杯/g," bowl ").replace(/本/g," skewer ").replace(/パック/g," pack ").replace(/切れ/g," slice ");
  let qty=null, unit=null;
  let m=s.match(/(\d+(?:\.\d+)?)\s*(grams?|grammes?|kg|ml|litres?|liters?|l|tbsp|tablespoons?|tsp|teaspoons?|cups?|bowls?|cans?|packs?|packets?|bottles?|scoops?|bars?|slices?|pieces?|pcs?|skewers?|sheets?|blocks?|handfuls?|g)\b/);
  if(m){ qty=parseFloat(m[1]); unit=canonUnit(m[2]); s=s.replace(m[0]," "); }
  if(qty===null){ let mn=s.match(/\s(\d+(?:\.\d+)?|a|an|one|two|three|four|five|six|seven|eight|nine|ten|half|couple|few)\s/);
    if(mn){ const w=mn[1]; qty=(NUMW[w]!==undefined)?NUMW[w]:parseFloat(w); s=s.replace(mn[0]," "); } }
  let foodText=s.replace(/\b(of|a|an|some|with|the|i|had|ate|eaten|eat|my|about|approx|approximately|around|plus|and|then|also)\b/g," ").replace(/[^a-z0-9\u3000-\u9fff ]/g," ").replace(/\s+/g," ").trim();
  return { qty, unit, foodText };
}
function aliasMatch(foodText){
  const toks=foodText.split(" ").filter(Boolean);
  for(let i=0;i<ALIAS.length;i++){ const phrase=ALIAS[i][0], name=ALIAS[i][1];
    if(/[a-z]/.test(phrase)){ const pw=phrase.split(" ");
      for(let j=0;j+pw.length<=toks.length;j++){ let ok=true; for(let k=0;k<pw.length;k++){ if(toks[j+k]!==pw[k]){ok=false;break;} } if(ok) return name; }
    } else { if(foodText.indexOf(phrase)>=0) return name; } }
  return null;
}
function matchFood(foodText){
  if(!foodText) return null;
  const a=aliasMatch(foodText); if(a) return a;
  const tset=new Set(foodText.split(" ").filter(Boolean));
  let best=null, bestScore=0;
  const pool=FOOD_KW.concat(state.customFoods.map(cf=>({n:cf.n,kw:kwOf(cf.n)})));
  for(let i=0;i<pool.length;i++){ const f=pool[i]; if(!f.kw.length) continue;
    let m=0; for(let j=0;j<f.kw.length;j++){ if(tset.has(f.kw[j])) m++; }
    if(!m) continue; const score=m+(m/f.kw.length); if(score>bestScore){ bestScore=score; best=f.n; } }
  return best;
}
function resolveAmount(food, qty, unit){
  let q=(qty==null||isNaN(qty))?1:qty;
  if(unit==="kg") return (food.u==="g")?q*1000:q;
  if(unit==="g"||unit==="ml") return (food.u==="g"||food.u==="ml")?q:1;
  if(food.u==="g"||food.u==="ml") return q*food.q;
  return q;
}
function parseMealText(text){
  if(!text||!text.trim()) return [];
  const segs=text.replace(/\r?\n/g,",").split(/,|;|\band\b|\+|、|・/).map(s=>s.trim()).filter(Boolean);
  const out=[];
  for(let i=0;i<segs.length;i++){ const ps=parseSeg(segs[i]); if(!ps) continue;
    const foodName=matchFood(ps.foodText); const fo=foodName?resolveFood(foodName):null;
    const amount=fo?resolveAmount(fo,ps.qty,ps.unit):(ps.qty||1);
    out.push({ id:uid(), raw:segs[i], foodName:foodName, amount:amount }); }
  return out;
}
function quickAddCard(){

  return '<section class="card stack-sm">'
    +'<div class="label">Quick add · type your meal</div>'
    +'<div style="display:flex;gap:8px;align-items:stretch">'
    +'<div class="field" style="flex:1"><input id="qaInput" value="'+esc(state.parseInput||"")+'" placeholder="e.g. 2 eggs, 150g chicken, bowl of rice" oninput="App.setParseInput(this.value)"></div>'

    +'</div>'
    +'<div class="note-muted">Offline estimate · review &amp; edit amounts before logging</div>'
    +review
    +'</section>';
}

const SPLITS={
  3:["FULL","cond","FULL","rest","FULL","cond","rest"],
  4:["UPPER","LOWER","cond","UPPER","LOWER","rest","rest"],
  5:["PUSH","PULL","LEGS","UPPER","LOWER","cond","rest"],
  6:["PUSH","PULL","LEGS","PUSH","PULL","LEGS","rest"]
};
const SESS={
  FULL:[{pat:["squat"],kind:"C"},{pat:["horiz_push","vert_push"],kind:"C"},{pat:["horiz_pull","vert_pull"],kind:"C"},{pat:["hinge","glute"],kind:"C"},{pat:["core"],kind:"A"},{pat:["raise"],kind:"A"}],
  UPPER:[{pat:["horiz_push"],kind:"C"},{pat:["horiz_pull"],kind:"C"},{pat:["vert_push"],kind:"C"},{pat:["vert_pull"],kind:"C"},{pat:["raise"],kind:"A"},{pat:["curl"],kind:"A"},{pat:["ext"],kind:"A"}],

};
const SESS_FOCUS={ FULL:"Full Body", UPPER:"Upper Body", LOWER:"Lower Body", PUSH:"Push · Chest/Shoulders/Triceps", PULL:"Pull · Back/Biceps", LEGS:"Legs" };
const EMPH={
  shoulders:{pat:["raise","rear"],sessions:["PUSH","PULL","UPPER","FULL"]},
  back:{pat:["horiz_pull","vert_pull"],sessions:["PULL","UPPER","FULL"]},
  chest:{pat:["horiz_push"],sessions:["PUSH","UPPER","FULL"]},
  arms:{pat:["curl","ext"],sessions:["PUSH","PULL","UPPER","FULL"]},
  glutes:{pat:["glute"],sessions:["LOWER","LEGS","FULL"]},
  legs:{pat:["lunge","ext_quad"],sessions:["LOWER","LEGS","FULL"]},
  core:{pat:["core"],sessions:["UPPER","LOWER","PUSH","PULL","LEGS","FULL"]}
};
function equipOK(eq,choice){ if(choice==="dumbbell") return eq==="dumbbell"||eq==="bodyweight"; if(choice==="bodyweight") return eq==="bodyweight"; return true; }
function repScheme(goal,kind){
  if(goal==="strength") return kind==="C"?["4","4-6"]:["3","6-8"];
  if(goal==="endurance") return kind==="C"?["3","12-15"]:["3","15-20"];
  if(goal==="powerbuilding") return kind==="C"?["5","4-6"]:["3","8-12"];
  return kind==="C"?["4","6-10"]:["3","10-15"];
}
function buildProgram(opts){
  const level={beginner:1,intermediate:2,advanced:3}[opts.level]||2;
  const goal=opts.goal||"hypertrophy", equip=opts.equip||"gym", days=opts.days||4, emph=opts.emphasis||[];
  const split=SPLITS[days]||SPLITS[4]; const used=new Set();
  const slotCap={1:4,2:5,3:6}[level];
  function choose(slot){
    let cands=EXLIB.filter(e=> slot.pat.indexOf(e.pat)>=0 && e.lv<=level && equipOK(e.eq,equip) && (slot.kind==="C"?e.kind==="C":true));
    if(slot.kind==="A"){ const acc=cands.filter(e=>e.kind==="A"); if(acc.length) cands=acc; }
    if(!cands.length) cands=EXLIB.filter(e=> slot.pat.indexOf(e.pat)>=0 && e.lv<=level && equipOK(e.eq,equip));
    if(!cands.length) return null;
    const fresh=cands.filter(e=>!used.has(e.n)); if(fresh.length) cands=fresh;
    const e=cands[Math.floor(Math.random()*cands.length)]; used.add(e.n); return e;
  }
  const plan=[]; let dayNum=0;
  split.forEach(s=>{ dayNum++;
    if(s==="rest"){ plan.push({id:uid(),name:"Day "+dayNum,focus:"Rest",type:"rest",note:"Full rest",exercises:[]}); return; }
    if(s==="cond"){ plan.push({id:uid(),name:"Day "+dayNum,focus:"Conditioning",type:"conditioning",note:"Intervals / bike / row · 20-30 min",exercises:[]}); return; }
    let slots=SESS[s].slice(0, slotCap + (s==="FULL"?1:0));
    emph.forEach(mg=>{ const ep=EMPH[mg]; if(ep && ep.sessions.indexOf(s)>=0) slots=slots.concat([{pat:ep.pat,kind:"A"}]); });
    const exs=[];
    slots.forEach(slot=>{ const e=choose(slot); if(!e) return; const rs=repScheme(goal,e.kind); let sets=rs[0], reps=rs[1];
      if(level===1 && e.kind==="C") sets=String(Math.max(3,(+rs[0])-1));
      if(e.iso){ reps = goal==="endurance"?"45-60s":"30-45s"; if(+sets>3) sets="3"; }
      exs.push(E(e.n,sets,reps)); });
    plan.push({id:uid(),name:"Day "+dayNum,focus:SESS_FOCUS[s],type:"lift",note:"",exercises:exs});
  });
  return plan;
}

function dayDiff(a,b){ const x=a.split("-"),y=b.split("-"); return Math.round((new Date(+x[0],+x[1]-1,+x[2])-new Date(+y[0],+y[1]-1,+y[2]))/864e5); }
function prettyDate(s){ const diff=dayDiff(s,TODAY); if(diff===0) return "Today"; if(diff===-1) return "Yesterday"; if(diff===1) return "Tomorrow";
  const a=s.split("-"); const d=new Date(+a[0],+a[1]-1,+a[2]); const wd=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"][d.getDay()]; return wd+" "+(+a[2])+"/"+(+a[1]); }
function esc(s){ return String(s==null?"":s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }

function computeTargets(d){
  const w=+d.weight, h=+d.height, a=+d.age;
  const s = d.sex==="female" ? -161 : 5;
  const bmr = 10*w + 6.25*h - 5*a + s;
  const AF = {sedentary:1.2, light:1.375, moderate:1.55, active:1.725, athlete:1.9}[d.activity] || 1.55;
  let cals = bmr*AF, ppk;
  if(d.goal==="lose"){ cals*=0.80; ppk=2.2; }
  else if(d.goal==="gain"){ cals*=1.10; ppk=2.0; }
  else { ppk=1.8; }
  cals = Math.round(cals/10)*10;
  const p = Math.round(w*ppk);
  const f = Math.round(cals*0.25/9);
  let c = Math.round((cals - p*4 - f*9)/4); if(c<0) c=0;
  return { p, c, f, s:Math.round(cals*0.10/4), sa:Math.round(cals*0.10/9), k:cals };
}

/* ---------- meal plan generator ---------- */
const PLAN_POOLS = {
  bProtein:["Whey protein","Greek yogurt","Egg"],
  bCarb:["Oats (dry)","Bread"],
  bFruit:["Banana","Apple"],
  bFat:["Peanut butter","Almonds","Mixed nuts"],
  lProtein:["Chicken breast","Salmon","Tuna (can)","Beef round","Chicken thigh"],
  lCarb:["White rice (dry)","Brown rice (dry)","Pasta (dry)","Sweet potato"],
  veg:["Broccoli","Spinach","Cabbage","Carrot","Bean sprouts (moyashi)"],
  dProtein:["Salmon","Saba (mackerel)","Chicken thigh","Beef round","Cod","Egg"],
  dCarb:["White rice (dry)","Brown rice (dry)","Soba (boiled)","Satoimo (taro)"],
  sProtein:["Greek yogurt","Whey protein","SAVAS milk protein"],
  sHealthy:["Almonds","Banana","Apple","Mixed nuts","Edamame (boiled)"],
  treat:["Chocolate (25g)","Senbei (rice cracker)","Pocky (~half pack)","Dorayaki","Pudding (purin)","Ice cream (cup)","SOYJOY (1 bar)","Dango (1 skewer)"]
};
function pick(a){ return a[Math.floor(Math.random()*a.length)]; }
function isCountUnit(u){ return !(u==="g"||u==="ml"); }
function pMac(name,amount){ const f=resolveFood(name); if(!f) return {p:0,c:0,f:0,k:0,s:0,sa:0}; const x=amount/f.q; return {p:f.p*x,c:f.c*x,f:f.f*x,k:f.k*x,s:f.s*x,sa:f.sa*x}; }
function sumMac(items){ return items.reduce((a,it)=>{const m=pMac(it.name,it.amount);return {p:a.p+m.p,c:a.c+m.c,f:a.f+m.f,k:a.k+m.k,s:a.s+m.s,sa:a.sa+m.sa};},{p:0,c:0,f:0,k:0,s:0,sa:0}); }
function clampAmt(f,u,role){
  if(isCountUnit(f.u)){ const m = f.u==="scoop"?3:((f.u==="tbsp"||f.u==="tsp")?3:4); return Math.min(m,Math.max(1,u)); }
  let lo=20,hi=300; if(role==="fat"){lo=0;hi=40;} if(role==="veg"){lo=80;hi=200;}
  return Math.min(hi,Math.max(lo,u));
}
function roundAmt(f,u){ return isCountUnit(f.u) ? Math.max(1,Math.round(u)) : Math.max(0,Math.round(u/5)*5); }
function setForP(name,gP,role){ const f=FOOD_BY_NAME[name]; let u=f.p>0?gP*f.q/f.p:f.q; return {name,amount:roundAmt(f,clampAmt(f,u,role))}; }
function setForC(name,gC,role){ const f=FOOD_BY_NAME[name]; let u=f.c>0?gC*f.q/f.c:f.q; return {name,amount:roundAmt(f,clampAmt(f,u,role))}; }
function setForF(name,gF,role){ const f=FOOD_BY_NAME[name]; let u=f.f>0?gF*f.q/f.f:f.q; return {name,amount:roundAmt(f,clampAmt(f,u,role))}; }
function planKeep(it){ return it && it.amount>0 && FOOD_BY_NAME[it.name]; }
function buildPlan(prefs){
  prefs = prefs || state.mealPrefs || {meals:"4",protein:"mixed",treat:"yes"};
  const T=TARGETS, P=PLAN_POOLS;
  const inDB=n=>!!FOOD_BY_NAME[n];
  const withSnack = prefs.meals!=="3";
  const fishL=["Salmon","Tuna (can)","Cod"].filter(inDB), fishD=["Salmon","Saba (mackerel)","Cod"].filter(inDB);
  const chkL=["Chicken breast","Chicken thigh"].filter(inDB), chkD=["Chicken thigh","Chicken breast"].filter(inDB);
  const vegP=["Firm tofu","Atsuage (fried tofu)","Natto","Edamame (boiled)","Greek yogurt","Egg"].filter(inDB);
  const lProt=()=>{ if(prefs.protein==="fish"&&fishL.length) return pick(fishL); if(prefs.protein==="chicken"&&chkL.length) return pick(chkL); if(prefs.protein==="veg"&&vegP.length) return pick(vegP); return pick(P.lProtein); };
  const dProt=()=>{ if(prefs.protein==="fish"&&fishD.length) return pick(fishD); if(prefs.protein==="chicken"&&chkD.length) return pick(chkD); if(prefs.protein==="veg"&&vegP.length) return pick(vegP); return pick(P.dProtein); };
  const ps = withSnack ? {b:0.25,l:0.30,d:0.30,s:0.15} : {b:0.30,l:0.35,d:0.35,s:0};
  const sel={ bP:pick(P.bProtein), bC:pick(P.bCarb), bFr:pick(P.bFruit), bFat:pick(P.bFat),
    lP:lProt(), lC:pick(P.lCarb), lV:pick(P.veg),
    dP:dProt(), dC:pick(P.dCarb), dV:pick(P.veg),
    sP:pick(P.sProtein), sX:(prefs.treat!=="no" && Math.random()<0.6 ? pick(P.treat):pick(P.sHealthy)) };
  const bPi=setForP(sel.bP,T.p*ps.b,"protein"), lPi=setForP(sel.lP,T.p*ps.l,"protein"),
        dPi=setForP(sel.dP,T.p*ps.d,"protein"), sPi=withSnack?setForP(sel.sP,T.p*ps.s,"protein"):null;
  const bFri={name:sel.bFr,amount:1};
  const bFati = sel.bFat==="Peanut butter" ? {name:"Peanut butter",amount:1} : {name:sel.bFat,amount:25};
  const sXi=withSnack?{name:sel.sX,amount:1}:null;
  const lVi={name:sel.lV,amount:120}, dVi={name:sel.dV,amount:120};
  let base=[bPi,lPi,dPi,sPi,bFri,bFati,sXi,lVi,dVi].filter(Boolean).filter(planKeep);
  let remC=Math.max(0,T.c - sumMac(base).c);
  const bCi=setForC(sel.bC,remC*0.25,"carb"), lCi=setForC(sel.lC,remC*0.40,"carb"), dCi=setForC(sel.dC,remC*0.35,"carb");
  let withCarb=base.concat([bCi,lCi,dCi]);
  let remF=T.f - sumMac(withCarb).f;
  let lOil=null,dOil=null;
  if(remF>4){ lOil=setForF("Olive oil",remF*0.5,"fat"); dOil=setForF("Sesame oil",remF*0.5,"fat"); }
  else if(remF>1){ lOil=setForF("Olive oil",remF,"fat"); }
  let allItems=[bCi,lCi,dCi,bPi,lPi,dPi,sPi,bFri,bFati,sXi,lVi,dVi].filter(Boolean).concat(lOil?[lOil]:[]).concat(dOil?[dOil]:[]).filter(planKeep);
  const carbItems=[bCi,lCi,dCi].filter(planKeep); const carbK=sumMac(carbItems).k;
  if(carbK>50){ let factor=1+(T.k - sumMac(allItems).k)/carbK; factor=Math.min(1.6,Math.max(0.6,factor));
    carbItems.forEach(ci=>{ const f=FOOD_BY_NAME[ci.name]; ci.amount=roundAmt(f,clampAmt(f,ci.amount*factor,"carb")); }); }
  const meals={
    breakfast:[bPi,bCi,bFri,bFati].filter(planKeep),
    lunch:[lPi,lCi,lVi].concat(lOil?[lOil]:[]).filter(planKeep),
    dinner:[dPi,dCi,dVi].concat(dOil?[dOil]:[]).filter(planKeep),
    snack:withSnack?[sPi,sXi].filter(Boolean).filter(planKeep):[]
  };
  const tot=sumMac([].concat(meals.breakfast,meals.lunch,meals.dinner,meals.snack));
  return { meals, tot, ts:Date.now() };
}
function missingPlanFoods(){ const mp=state.mealPlan; if(!mp||!mp.meals) return []; const seen={},out=[];
  ["breakfast","lunch","dinner","snack"].forEach(k=>(mp.meals[k]||[]).forEach(it=>{ if(it&&it.name&&!seen[it.name]&&!resolveFood(it.name)){ seen[it.name]=1; out.push(it); } }));
  return out; }

        return '<div class="item" style="padding:6px 10px"><div class="min0"><div class="truncate" style="font-size:13px">'+esc(it.name)+(f?'':' <span style="color:var(--red);font-size:10px">· needs macros</span>')+'</div></div>'
          +'<div style="display:flex;align-items:center;gap:5px"><input class="inp-num" inputmode="decimal" value="'+r1(it.amount)+'" style="max-width:60px" onchange="App.setPlanAmount(\''+key+'\','+idx+',this.value)"><span class="mono" style="font-size:10px;color:var(--muted);min-width:18px">'+(f?esc(f.u):'?')+'</span>'

        +'<div class="row2" style="margin-top:6px"><button class="btn small" style="width:100%" onclick="App.savePlanNewFood()">Save &amp; add</button>'
        +'<button class="btn small ghost" style="width:100%;color:var(--text)" onclick="App.cancelPlanNewFood()">Cancel</button></div></div>';
    } else if(edit){
      addRow='<div style="display:flex;gap:6px;margin-top:6px;align-items:center">'
        +'<input id="pf_'+key+'" list="foodlist" autocomplete="off" placeholder="Add food…" style="flex:2">'
        +'<input id="pa_'+key+'" class="inp-num" inputmode="decimal" placeholder="amt" style="flex:1">'
        +'<button class="btn small" style="width:auto;padding:9px 14px" onclick="App.addPlanFood(\''+key+'\')">＋</button></div>';

    return '<div style="margin-top:8px"><div style="display:flex;justify-content:space-between;align-items:baseline">'
      +'<div class="gauge-name">'+o[1]+'</div><div class="mono" style="font-size:11px;color:var(--muted)">'+Math.round(m.k)+' kcal · '+Math.round(m.p)+'P</div></div>'
      +'<div class="stack-sm" style="margin-top:5px">'+(rows||'<div class="note-muted" style="font-size:12px">No items yet</div>')+'</div>'
      + addRow
      + (edit?'':'<button class="btn ghost small" style="margin-top:6px;color:var(--text)" onclick="App.logPlanMeal(\''+key+'\')">Log '+o[1]+'</button>')
      +'</div>'; }).join("");
  const all=[].concat(mp.meals.breakfast||[],mp.meals.lunch||[],mp.meals.dinner||[],mp.meals.snack||[]);
  const t=sumMac(all), T=TARGETS;
  const summ='<div class="row2" style="margin-top:12px">'
    +'<div class="stat"><div class="label">Plan kcal</div><div class="v" style="font-size:18px">'+Math.round(t.k)+'<span style="font-size:11px;color:var(--muted)"> / '+T.k+'</span></div></div>'
    +'<div class="stat"><div class="label">Plan protein</div><div class="v" style="font-size:18px;color:var(--gold)">'+Math.round(t.p)+'<span style="font-size:11px;color:var(--muted)"> / '+T.p+'</span></div></div></div>'
    +'<div class="note-muted" style="margin-top:4px">'+Math.round(t.c)+'C · '+Math.round(t.f)+'F'+(edit?' · add foods by name + amount; unknown foods ask for macros':' · estimate — tweak amounts as you log')+'</div>';

  return '<section class="card stack-sm">'+head+body+summ
    +(edit?'<button class="btn ghost small" onclick="App.clearPlan()">Clear plan</button>':'')+'</section>';

function macroBar(label, eaten, target, limit){
  const pct = target ? Math.min(100,(eaten/target)*100) : 0;
  let cls="";
  if(limit) cls = eaten>target ? "over" : "good";
  else if(eaten>target*1.1) cls="over";
  else if(eaten>=target*0.9) cls="good";
  return '<div class="gauge-wrap"><div class="gauge-top">'
    + '<div class="gauge-name">'+label+'</div>'
    + '<div class="gauge-val"><b>'+Math.round(eaten)+'</b><span class="t"> / '+target+(limit?" max":"")+'</span></div></div>'
    + '<div class="gauge"><div class="gfill '+cls+'" style="width:'+pct+'%"></div></div></div>';
}

function backupNudge(){
  const hasData=state.flog.length||state.wlog.length||state.blog.length;
  if(!hasData) return "";
  const lb=state.meta.lastBackup;
  const days=lb?Math.floor((Date.now()-lb)/864e5):null;
  if(days!==null && days<7) return "";
  const msg=lb?("Last backup "+days+" day"+(days===1?"":"s")+" ago"):"No backup yet";
  return '<button class="card" style="display:flex;align-items:center;justify-content:space-between;width:100%;text-align:left;border-color:var(--gold)" onclick="App.exportData()">'
    +'<span style="font-size:13px;color:var(--text)">⤓ '+msg+' — tap to export</span><span class="chip on" style="white-space:nowrap">Export</span></button>';
}

function viewTrain(){
  const ld=App.liftDays();
  if(ld.length===0){
    return '<div class="stack"><div class="label">Today\'s session</div>'
      + emptyBox("No lifting days in your plan. Open Plan to build one.")
      + '<button class="btn" onclick="App.setTab(\'plan\')">Go to Plan</button></div>';
  }
  const day=App.currentDay();
  const names=day.exercises.map(e=>e.name).filter(Boolean);
  const customNames=state.customExercises.map(e=>e.n);
  const allNames=names.concat(customNames);
  if(state.trainEx==null || !allNames.includes(state.trainEx)) state.trainEx=names[0]||customNames[0]||null;
  const exObj=day.exercises.find(e=>e.name===state.trainEx);
  const selectedExIsCustom=!names.includes(state.trainEx) && customNames.includes(state.trainEx);
  const hasAnyEx=names.length || customNames.length;
  const today=state.wlog.filter(s=>s.date===state.viewDate);
  const dayWord=state.viewDate===TODAY?"today":prettyDate(state.viewDate);

  let chips=ld.map(d=>'<button class="chip'+(d.id===day.id?' on':'')+'" onclick="App.setTrainDay(\''+d.id+'\')">'+esc(d.name)+'</button>').join("");

  let list = today.length===0 ? emptyBox("No sets yet. Pick an exercise and log your first.")
    : '<div class="stack-sm">'+today.slice().reverse().map(s=>
        state.editSet===s.id
        ? '<div class="item"><div class="min0"><div class="truncate" style="font-weight:600;font-size:14px">'+esc(s.exercise)+'</div>'
          +'<div style="display:flex;align-items:center;gap:6px;margin-top:4px"><input id="ew_'+s.id+'" class="inp-num" inputmode="decimal" value="'+s.weight+'" style="max-width:64px"><span class="mono" style="font-size:11px;color:var(--muted)">kg ×</span><input id="er_'+s.id+'" class="inp-num" inputmode="numeric" value="'+s.reps+'" style="max-width:56px"></div></div>'
          +'<div style="display:flex;align-items:center;gap:6px"><button class="chip on" onclick="App.editSetSave(\''+s.id+'\')">✓</button><button class="chip" onclick="App.editCancel()">✕</button></div></div>'
        : '<div class="item"><div class="min0" onclick="App.editSetStart(\''+s.id+'\')" style="cursor:pointer"><div class="truncate" style="font-weight:600;font-size:14px">'+esc(s.exercise)+'</div>'
        +'<div class="note-muted">'+esc(s.day)+' · tap to edit</div></div>'
        +'<div style="display:flex;align-items:center;gap:8px"><div class="mono" style="font-size:15px;font-weight:700;color:var(--teal);white-space:nowrap">'+s.weight+'kg × '+s.reps+'</div>'
        +'<button class="x" onclick="App.delSet(\''+s.id+'\')">×</button></div></div>').join("")+'</div>';

  const planCards=day.exercises.filter(e=>e.name).map(ex=>planExCard(day,ex)).join("");

  return '<div class="stack">'
    + '<section class="stack-sm">'+dateStepper()+banner("Today's Session","本日の鍛錬")+'<div class="chips">'+chips+'</div>'
    + '<div style="margin-top:8px;font-size:13px;color:var(--muted)">'+esc(day.focus)+'</div></section>'
    + (planCards || emptyBox("No exercises in this day — add them in Plan, or log off-plan below."))
    + expander('offplan','＋ Log something off-plan','Search any exercise, or add a custom one', ()=>trainExCard(day, names, customNames, exObj, selectedExIsCustom, hasAnyEx))
    + '<section><div style="display:flex;align-items:baseline;justify-content:space-between"><div class="label">Logged '+esc(dayWord)+'</div>'
    +   '<div class="mono" style="font-size:12px;color:var(--muted)">'+today.length+' sets</div></div>'+list+'</section>'
    + '</div>';
}
function trainExCard(day, names, customNames, exObj, selectedExIsCustom, hasAnyEx){
  const seg='<div style="display:flex;align-items:center;justify-content:space-between">'
    +'<div class="label">Exercise</div><div class="seg">'
    +'<button onclick="App.setTrainMode(\'list\')" style="'+(state.trainMode!=="custom"?"background:var(--teal);color:var(--ink)":"")+'">List</button>'
    +'<button onclick="App.setTrainMode(\'custom\')" style="'+(state.trainMode==="custom"?"background:var(--teal);color:var(--ink)":"")+'">Custom</button>'
    +'</div></div>';
  let exPart;
  if(state.trainMode==="custom"){
    exPart='<div class="field" style="margin-top:6px"><input id="cExName" value="'+esc(state.trainCustomName||"")+'" placeholder="e.g. Cable Crossover" oninput="App.setTrainCustomName(this.value)"></div>'
      +'<label style="display:flex;align-items:center;gap:8px;font-size:13px;color:var(--muted);margin-top:8px"><input type="checkbox" id="cExSave" style="width:16px;height:16px;accent-color:#2DD4BF"> Save to My Exercises for next time</label>';
  } else {
    const cid=(state.customExercises.find(e=>e.n===state.trainEx)||{}).id;
    exPart=hasAnyEx
      ? '<div class="field" style="margin-top:6px"><input id="exPick" list="exlist" autocomplete="off" value="'+esc(state.trainEx||"")+'" placeholder="Search exercises…" onchange="App.pickEx(this.value)"></div>'
        +exDatalist(names,customNames)
        +(exObj?'<div class="hint">Target · '+esc(exObj.sets)+' × '+esc(exObj.reps)+'</div>':'')
        +(selectedExIsCustom?'<button onclick="App.delCustomExercise(\''+cid+'\')" style="background:none;color:var(--muted);font-size:12px;text-decoration:underline;text-align:left;margin-top:6px">Remove “'+esc(state.trainEx)+'” from My Exercises</button>':'')
      : '<div style="color:var(--muted);font-size:14px;margin-top:6px">No exercises here — add them in Plan, or use Custom above.</div>';

    +'<div><div class="label">Reps</div><div class="field" style="margin-top:6px"><input id="tr" class="inp-num" inputmode="numeric" placeholder="8"></div></div>'
    +'</div>'+logBtn+'</section>';
}

function programPanel(){
  if(!state.progOpen){
    const hasProg=state.plan.some(d=>d.type==="lift" && d.exercises.length);
    if(hasProg){
      return '<button class="card" style="display:flex;align-items:center;justify-content:space-between;width:100%;text-align:left;padding:10px 14px" onclick="App.openProgram()">'
        +'<span style="font-size:13px;color:var(--muted)">⚙ Auto-generate / replace program</span><span style="color:var(--teal)">›</span></button>';
    }
    return '<section class="card stack-sm"><div class="label">Auto-generate</div>'
      +'<div class="note-muted">Build a balanced program for your level, goal, days &amp; equipment — then edit anything below.</div>'
      +'<button class="btn" onclick="App.openProgram()">Generate a program</button></section>';
  }
  const d=state.progData;
  const seg=(k,opts)=>'<div class="seg" style="width:100%;flex-wrap:wrap">'+opts.map(o=>'<button style="flex:1;min-width:62px;'+(d[k]===o[0]?"background:var(--teal);color:var(--ink)":"")+'" onclick="App.pickProg(\''+k+'\',\''+o[0]+'\')">'+o[1]+'</button>').join("")+'</div>';
  const emphChips=[["shoulders","Shoulders"],["back","Back"],["chest","Chest"],["arms","Arms"],["glutes","Glutes"],["legs","Legs"],["core","Core"]]
    .map(o=>'<button class="chip'+(d.emphasis.indexOf(o[0])>=0?" on":"")+'" onclick="App.toggleEmph(\''+o[0]+'\')">'+o[1]+'</button>').join("");
  return '<section class="card stack-sm"><div style="display:flex;justify-content:space-between;align-items:center"><div class="label">Auto-generate</div>'
    +'<button class="btn ghost small" style="width:auto;padding:5px 12px;color:var(--text)" onclick="App.closeProgram()">Cancel</button></div>'
    +'<div><div class="label">Experience</div><div style="margin-top:6px">'+seg("level",[["beginner","Beginner"],["intermediate","Intermediate"],["advanced","Advanced"]])+'</div></div>'
    +'<div><div class="label">Goal</div><div style="margin-top:6px">'+seg("goal",[["strength","Strength"],["hypertrophy","Muscle"],["endurance","Endurance"],["powerbuilding","Power+Build"]])+'</div></div>'
    +'<div><div class="label">Days / week</div><div style="margin-top:6px">'+seg("days",[["3","3"],["4","4"],["5","5"],["6","6"]])+'</div></div>'
    +'<div><div class="label">Equipment</div><div style="margin-top:6px">'+seg("equip",[["gym","Full gym"],["dumbbell","Dumbbells"],["bodyweight","Bodyweight"]])+'</div></div>'
    +'<div><div class="label">Emphasis · optional, max 3</div><div class="chips" style="margin-top:6px">'+emphChips+'</div></div>'
    +'<div class="note-muted">Gives exercises, sets &amp; reps — you choose the weight and add load over time. Warm up first, and swap anything that causes pain.</div>'
    +'<button class="btn" onclick="App.generateProgram()">Generate &amp; replace program</button></section>';
}

      +(d.type===t[0]?('background:'+t[2]+';color:var(--ink)'):'')+'">'+t[1]+'</button>').join("")+'</div>';

        '<div class="ex" style="margin-bottom:8px">'
        + '<div style="display:flex;align-items:center;gap:8px"><input class="name" list="exliblist" value="'+esc(e.name)+'" placeholder="Search or type exercise" oninput="App.editEx(\''+d.id+'\',\''+e.id+'\',\'name\',this.value)">'
        +   '<button class="x" onclick="App.delEx(\''+d.id+'\',\''+e.id+'\')">×</button></div>'
        + '<div style="display:flex;align-items:center;gap:8px;margin-top:8px">'
        +   '<div class="sr"><input style="width:28px;text-align:center" value="'+esc(e.sets)+'" placeholder="4" oninput="App.editEx(\''+d.id+'\',\''+e.id+'\',\'sets\',this.value)">'
        +     '<span style="color:var(--muted);font-size:12px">×</span>'
        +     '<input style="width:70px" value="'+esc(e.reps)+'" placeholder="6-8" oninput="App.editEx(\''+d.id+'\',\''+e.id+'\',\'reps\',this.value)"></div>'
        +   '<div style="flex:1"></div>'
        +   '<button class="move" onclick="App.moveEx(\''+d.id+'\',\''+e.id+'\',-1)" '+(idx===0?'disabled':'')+'>↑</button>'
        +   '<button class="move" onclick="App.moveEx(\''+d.id+'\',\''+e.id+'\',1)" '+(idx===d.exercises.length-1?'disabled':'')+'>↓</button>'

      body=(d.exercises.length?exs:'<div style="color:var(--muted);font-size:13px;margin-bottom:8px">No exercises — add one below.</div>')

    } else {
      body='<div class="label">Prescription</div><div class="field" style="margin-top:6px">'
        + '<input value="'+esc(d.note)+'" placeholder="e.g. Sprints 20-30 min" oninput="App.editNote(\''+d.id+'\',this.value)"></div>';
    }
    return '<section class="card stack-sm">'
      + '<div style="display:flex;align-items:center;gap:8px">'
      +   '<input class="focus-inp" style="font-weight:700;flex:1" value="'+esc(d.name)+'" placeholder="Day name" oninput="App.editDayName(\''+d.id+'\',this.value)">'
      +   '<button class="x" onclick="App.delDay(\''+d.id+'\')" title="Delete day">×</button></div>'
      + '<div>'+seg+'</div>'
      + '<input class="focus-inp" value="'+esc(d.focus)+'" placeholder="Focus (e.g. Back & rear delts)" oninput="App.editFocus(\''+d.id+'\',this.value)">'
      + body + '</section>';

  const lifts=state.plan.filter(d=>d.type==="lift").length;
  return '<div class="stack-sm">'
    + '<div style="display:flex;align-items:baseline;justify-content:space-between"><div class="label">Training plan</div>'

    + programPanel()
    + cards
    + (state.plan.length?'':'<div class="note-muted" style="text-align:center;padding:10px 4px">No training days yet. Generate a program above, or add a day to build your own.</div>')
    + '<button class="btn ghost" onclick="App.addDay()">+ Add training day</button>'
    + exLibDatalist()
    + (state.plan.length?'<button class="btn ghost" style="margin-top:2px;color:var(--muted)" onclick="App.resetPlan()">↺ Clear all days</button>':'')
    + '</div>';
}

function exLibDatalist(){
  const seen={}; let names=[];
  EXLIB.forEach(e=>{ if(!seen[e.n]){ seen[e.n]=1; names.push(e.n); } });
  state.customExercises.forEach(c=>{ if(c&&c.n&&!seen[c.n]){ seen[c.n]=1; names.push(c.n); } });
  names.sort((a,b)=>a.localeCompare(b));
  return '<datalist id="exliblist">'+names.map(n=>'<option value="'+esc(n)+'"></option>').join("")+'</datalist>';
}
function recentFoods(){ const seen={}, out=[]; for(let i=state.flog.length-1;i>=0 && out.length<8;i--){ const n=state.flog[i].name; if(!seen[n]){ seen[n]=1; out.push(n); } } return out; }
function foodDatalist(){
  const seen={}; let names=[];
  state.customFoods.forEach(cf=>{ if(cf&&cf.n&&!seen[cf.n]){ seen[cf.n]=1; names.push(cf.n); } });
  FOODS.forEach(x=>{ if(!seen[x.n]){ seen[x.n]=1; names.push(x.n); } });
  return '<datalist id="foodlist">'+names.map(n=>'<option value="'+esc(n)+'"></option>').join("")+'</datalist>';
}
function exDatalist(names, customNames){
  const seen={}; let out=[];
  (names||[]).concat(customNames||[]).forEach(n=>{ if(n&&!seen[n]){ seen[n]=1; out.push(n); } });
  return '<datalist id="exlist">'+out.map(n=>'<option value="'+esc(n)+'"></option>').join("")+'</datalist>';
}
function viewEat(){
  const today=state.flog.filter(e=>e.date===state.viewDate);
  const dayWord=state.viewDate===TODAY?"today":prettyDate(state.viewDate);
  const tot=today.reduce((a,e)=>({p:a.p+e.p,c:a.c+e.c,f:a.f+e.f,s:a.s+e.s,sa:a.sa+e.sa,k:a.k+e.k}),{p:0,c:0,f:0,s:0,sa:0,k:0});
  if(!state.eatFood) state.eatFood=FOODS[0].n;
  const fo=resolveFood(state.eatFood);
  const selectedIsCustom = !!(fo && fo.custom);
  const mealChips=MEALS.map(m=>'<button class="chip'+(m===state.eatMeal?' on':'')+'" onclick="App.setMeal(\''+m+'\')">'+m+'</button>').join("");

  const groups=MEALS.concat(["Other"]).map(m=>({m,items:today.filter(e=>(MEALS.indexOf(e.meal)>=0?e.meal:"Other")===m)})).filter(g=>g.items.length);
  let list = groups.length===0 ? emptyBox("Nothing logged yet. Pick a meal and add a food.")
    : groups.map(g=>{ const sub=g.items.reduce((a,e)=>({k:a.k+e.k,p:a.p+e.p}),{k:0,p:0});
        return '<div style="margin-bottom:16px"><div style="display:flex;align-items:baseline;justify-content:space-between;margin-bottom:6px;padding:0 4px">'
          +'<div style="text-transform:uppercase;letter-spacing:.16em;font-size:11px;color:var(--teal);font-weight:700">'+g.m+'</div>'
          +'<div class="mono" style="font-size:11px;color:var(--muted)">'+Math.round(sub.k)+' kcal · '+r1(sub.p)+'P</div></div>'
          +'<div class="stack-sm">'+g.items.slice().reverse().map(e=>
            state.editFood===e.id
            ? '<div class="item"><div class="min0"><div class="truncate" style="font-weight:600;font-size:14px">'+esc(e.name)+'</div>'
              +'<div style="display:flex;align-items:center;gap:6px;margin-top:4px"><input id="ef_'+e.id+'" class="inp-num" inputmode="decimal" value="'+r1(e.amount)+'" style="max-width:90px"><span class="mono" style="font-size:11px;color:var(--muted)">'+esc(e.unit)+'</span></div></div>'
              +'<div style="display:flex;align-items:center;gap:6px"><button class="chip on" onclick="App.editFoodSave(\''+e.id+'\')">✓</button><button class="chip" onclick="App.editCancel()">✕</button></div></div>'
            : '<div class="item"><div class="min0" onclick="App.editFoodStart(\''+e.id+'\')" style="cursor:pointer"><div class="truncate" style="font-weight:600;font-size:14px">'+esc(e.name)+'</div>'
            +'<div class="mono" style="font-size:10.5px;color:var(--muted)">'+r1(e.amount)+' '+esc(e.unit)+' · '+Math.round(e.k)+' kcal · tap to edit</div></div>'
            +'<div style="display:flex;align-items:center;gap:8px"><div class="mono" style="font-size:12px;color:var(--teal);font-weight:700;white-space:nowrap">'+r1(e.p)+'P</div>'
            +'<button class="x" onclick="App.delFood(\''+e.id+'\')">×</button></div></div>').join("")+'</div></div>';
      }).join("");

  return '<div class="stack">'
    + banner("Nutrition","栄養ゲージ")
    + '<section class="stack-sm">'+dateStepper()+'<div class="label">Logging to</div><div class="chips">'+mealChips+'</div></section>'
    + mealPlanPanel()
    + '<section class="card stack-sm">'
    +   '<div style="display:flex;align-items:baseline;justify-content:space-between"><div class="label">'+(state.viewDate===TODAY?"Today":esc(prettyDate(state.viewDate)))+' vs target</div>'
    +     '<div class="mono" style="font-size:12px;color:var(--muted)">'+today.length+' items</div></div>'
    +   macroBar("Protein g",tot.p,TARGETS.p,false)
    +   macroBar("Carbs g",tot.c,TARGETS.c,false)
    +   macroBar("Fat g",tot.f,TARGETS.f,false)
    +   macroBar("Energy kcal",tot.k,TARGETS.k,false)
    +   '<div class="row2" style="padding-top:4px">'
    +     miniLimit("Sugars",tot.s,TARGETS.s)+miniLimit("Sat fat",tot.sa,TARGETS.sa)+'</div>'
    + '</section>'
    + fixupCard()
    + eatFoodCard(fo, selectedIsCustom)
    + expander('quick','Quick add from text', 'Type a meal in plain words to log it fast', quickAddCard)
    + '<section><div style="display:flex;align-items:center;justify-content:space-between"><div class="label">Eaten '+esc(dayWord)+'</div>'
    +   '<button class="chip" onclick="App.copyYesterday()">⧉ Copy '+(state.viewDate===TODAY?"yesterday":"prev day")+'</button></div>'
    +   '<div style="margin-top:8px">'+list+'</div></section>'
    + '</div>';
}

function miniLimit(label,eaten,target){ const over=eaten>target;
  return '<div style="background:var(--panel2);border:1px solid '+(over?'var(--red)':'var(--line)')+';border-radius:12px;padding:8px 12px;display:flex;align-items:baseline;justify-content:space-between">'

    +'<span style="color:var(--muted);font-weight:400">/'+target+'</span></div></div>';
}

function viewBody(){
  const sorted=state.blog.slice().sort((a,b)=>b.date.localeCompare(a.date));
  const last7=state.blog.slice(-7);
  const avg=last7.length?r1(last7.reduce((a,x)=>a+x.kg,0)/last7.length):"—";
  const latest=sorted[0]?r1(sorted[0].kg):"—";
  let recent = sorted.length===0 ? emptyBox("No weigh-ins yet. Log today to start the trend.")
    : '<div class="stack-sm">'+sorted.slice(0,10).map(x=>'<div class="item"><div class="mono" style="font-size:12px;color:var(--muted)">'+x.date+'</div><div class="mono" style="font-size:15px;font-weight:700">'+r1(x.kg)+' kg</div></div>').join("")+'</div>';
  return '<div class="stack">'
    + '<div class="row2"><div class="stat"><div class="label">Latest kg</div><div class="v" style="font-size:30px">'+latest+'</div></div>'
    +   '<div class="stat"><div class="label">7-day avg</div><div class="v" style="font-size:30px;color:var(--teal)">'+avg+'</div></div></div>'
    + '<section class="card stack-sm">'
    +   '<div><div class="label">Today\'s weigh-in · kg</div><div class="field" style="margin-top:6px"><input id="kg" class="inp-num" style="font-size:20px" inputmode="decimal" placeholder="85.0" value="'+(state.blog.find(x=>x.date===TODAY)?state.blog.find(x=>x.date===TODAY).kg:"")+'"></div></div>'
    +   '<button class="btn" onclick="App.saveWeight()">Save today\'s weight</button>'
    +   '<div class="note-muted">Best first thing, after the toilet, before food.</div>'
    + '</section>'
    + '<section><div class="label">Recent</div><div style="margin-top:8px">'+recent+'</div></section>'
    + '<section class="card stack-sm"><div class="label">Targets</div>'
    +   '<div class="note-muted">'+(state.profile && !state.profile.skipped ? 'Goal: '+esc(state.profile.goal)+' · '+TARGETS.k+' kcal · '+TARGETS.p+'P / '+TARGETS.c+'C / '+TARGETS.f+'F' : TARGETS.k+' kcal · '+TARGETS.p+'P / '+TARGETS.c+'C / '+TARGETS.f+'F')+'</div>'
    +   '<button class="btn ghost small" style="color:var(--muted)" onclick="App.setTab(\'stats\')">Recalculate in Stats → Settings</button>'
    + '</section>'
    + '</div>';
}

function weightSVG(){
  const data=state.blog.slice().sort((a,b)=>a.date.localeCompare(b.date));
  if(data.length===0) return emptyBox("Weigh in on the Body tab to start the trend.");
  const W=320,H=170,pad=26;
  const pts=data.map((x,i)=>{ const win=data.slice(Math.max(0,i-6),i+1); return {kg:x.kg, avg:win.reduce((a,w)=>a+w.kg,0)/win.length, lbl:md(x.date)}; });
  const ys=pts.reduce((a,p)=>a.concat([p.kg,p.avg]),[]); let mn=Math.min.apply(null,ys), mx=Math.max.apply(null,ys);
  if(mn===mx){ mn-=1; mx+=1; } mn-=0.4; mx+=0.4;
  const X=i=> pad + (pts.length===1?(W-2*pad)/2:i*(W-2*pad)/(pts.length-1));
  const Y=v=> H-pad - (v-mn)/(mx-mn)*(H-2*pad);
  function poly(key,col,wd){ return '<polyline fill="none" stroke="'+col+'" stroke-width="'+wd+'" stroke-linejoin="round" points="'+pts.map((p,i)=>X(i)+','+Y(p[key])).join(" ")+'"/>'; }
  const grid='<line x1="'+pad+'" y1="'+(H-pad)+'" x2="'+(W-pad)+'" y2="'+(H-pad)+'" stroke="#3C2E36"/>'
    +'<text x="2" y="'+(Y(mx)+4)+'" fill="#9C8F86" font-size="10" font-family="monospace">'+r1(mx)+'</text>'
    +'<text x="2" y="'+(Y(mn)+4)+'" fill="#9C8F86" font-size="10" font-family="monospace">'+r1(mn)+'</text>';
  const lbls='<text x="'+X(0)+'" y="'+(H-8)+'" fill="#9C8F86" font-size="9" font-family="monospace">'+pts[0].lbl+'</text>'
    +(pts.length>1?'<text x="'+(W-pad)+'" y="'+(H-8)+'" text-anchor="end" fill="#9C8F86" font-size="9" font-family="monospace">'+pts[pts.length-1].lbl+'</text>':'');
  return '<svg viewBox="0 0 '+W+' '+H+'" width="100%" height="'+H+'" preserveAspectRatio="xMidYMid meet">'+grid+poly("kg","#9C8F86",1.4)+poly("avg","#F1B23E",2.6)+lbls+'</svg>';
}

function dms(s){ const a=s.split("-"); return new Date(+a[0],+a[1]-1,+a[2]).getTime(); }
function goalStats(){
  const blog=state.blog.slice().sort((a,b)=>a.date.localeCompare(b.date));
  const gw = (state.profile && state.profile.goalWeight) ? +state.profile.goalWeight : null;
  const res={ gw:gw, current:null, latest:null, slopePerWk:null, etaDays:null, etaDate:null };
  if(!blog.length) return res;
  res.latest = blog[blog.length-1].kg;
  const last7=blog.slice(-7); res.current = last7.reduce((a,x)=>a+x.kg,0)/last7.length;
  let win = blog.filter(x=>dms(x.date) >= Date.now()-28*864e5);
  if(win.length<2) win = blog.slice(-Math.min(blog.length,6));
  if(win.length>=2){
    const t0=dms(win[0].date);
    const xs=win.map(x=>(dms(x.date)-t0)/864e5), ys=win.map(x=>x.kg);
    const n=xs.length, sx=xs.reduce((a,b)=>a+b,0), sy=ys.reduce((a,b)=>a+b,0);
    const sxx=xs.reduce((a,b)=>a+b*b,0), sxy=xs.reduce((a,b,i)=>a+b*ys[i],0);
    const den=n*sxx-sx*sx, slope = den!==0 ? (n*sxy-sx*sy)/den : 0;
    res.slopePerWk = slope*7;
    if(gw!=null){ const need=gw-res.current;
      if(Math.abs(slope)>0.0005 && Math.sign(slope)===Math.sign(need)){
        const days=Math.round(need/slope);
        if(days>0 && days<3650){ res.etaDays=days; res.etaDate=dstr(new Date(Date.now()+days*864e5)); }
      } }
  }
  return res;
}
function adherenceStats(){
  const cut=daysAgo(13), byDay={};
  state.flog.filter(e=>e.date>=cut).forEach(e=>{ const d=byDay[e.date]||(byDay[e.date]={k:0,p:0}); d.k+=e.k; d.p+=e.p; });
  const dl=Object.keys(byDay).sort(); let kcalOk=0, protOk=0;
  dl.forEach(d=>{ const t=byDay[d]; if(t.k>=TARGETS.k*0.9 && t.k<=TARGETS.k*1.1) kcalOk++; if(t.p>=TARGETS.p*0.9) protOk++; });
  let streak=0; for(let i=dl.length-1;i>=0;i--){ if(byDay[dl[i]].p>=TARGETS.p*0.9) streak++; else break; }
  return { logged:dl.length, kcalOk, protOk, streak };
}

function viewStats(){
  const cut=daysAgo(6);
  const recent=state.wlog.filter(s=>s.date>=cut);
  const by={}; recent.forEach(s=>{ by[s.day]=(by[s.day]||0)+1; });
  const days=Object.keys(by).sort(); const maxV=days.length?Math.max.apply(null,days.map(d=>by[d])):0;
  const weekSets=recent.length;
  const weekSessions=new Set(recent.map(s=>s.date+s.day)).size;
  const kToday=Math.round(state.flog.filter(e=>e.date===TODAY).reduce((a,e)=>a+e.k,0));

  let bars = days.length===0 ? emptyBox("Log a few sets to see your volume build.")
    : '<div class="bars">'+days.map(d=>{ const h=Math.round((by[d]/maxV)*120);
        return '<div class="barcol"><div class="barval">'+by[d]+'</div><div class="bar" style="height:'+h+'px"></div><div class="barlabel">'+esc(d.replace("Day ","D"))+'</div></div>';
      }).join("")+'</div>';

  const g=goalStats();
  let goalCard;
  if(g.gw==null){
    goalCard='<section class="card stack-sm"><div class="label">Goal weight</div>'
      +'<div class="note-muted">Set a target to track progress &amp; projected date.</div>'
      +'<div style="display:flex;gap:8px"><div class="field" style="flex:1"><input id="gwInput" class="inp-num" inputmode="decimal" placeholder="e.g. 80"></div>'
      +'<button class="btn small" style="width:auto;padding:0 18px" onclick="App.setGoalWeight()">Set</button></div></section>';
  } else {
    const rem = g.current!=null ? r1(Math.abs(g.current-g.gw)) : "—";
    const rate = g.slopePerWk;
    const rateStr = rate==null ? "—" : (rate>0?"+":"")+r1(rate)+" kg/wk";
    const toward = g.current!=null && Math.sign(rate||0)===Math.sign(g.gw-g.current);
    const rateColor = (rate==null||Math.abs(rate)<0.02) ? "var(--muted)" : (toward?"var(--green)":"var(--red)");
    const eta = g.etaDate ? ("~ "+md(g.etaDate)+" · "+Math.max(1,Math.round(g.etaDays/7))+" wk") : "no clear trend yet";
    goalCard='<section class="card stack-sm"><div class="label">Goal · weight</div>'
      +'<div class="row3">'
      +'<div class="stat"><div class="label">Now</div><div class="v" style="font-size:22px">'+r1(g.current)+'</div></div>'
      +'<div class="stat"><div class="label">Goal</div><div class="v" style="font-size:22px;color:var(--gold)">'+r1(g.gw)+'</div></div>'
      +'<div class="stat"><div class="label">To go</div><div class="v" style="font-size:22px">'+rem+'</div></div></div>'
      +'<div class="row2">'
      +'<div class="stat"><div class="label">Rate</div><div class="v" style="font-size:18px;color:'+rateColor+'">'+rateStr+'</div></div>'
      +'<div class="stat"><div class="label">Projected</div><div class="v" style="font-size:13px">'+eta+'</div></div></div>'
      +'<div style="display:flex;gap:8px;align-items:center"><div class="note-muted" style="flex:1">Adjust goal weight</div>'
      +'<div class="field" style="padding:5px 8px;width:78px"><input id="gwInput" class="inp-num" style="font-size:14px" inputmode="decimal" value="'+r1(g.gw)+'"></div>'
      +'<button class="btn ghost small" style="width:auto;padding:6px 12px;color:var(--text)" onclick="App.setGoalWeight()">Update</button></div>'
      +'</section>';
  }

  const ad=adherenceStats();
  let adCard='<section class="card stack-sm"><div class="label">Adherence · last 14 days</div>';
  if(ad.logged===0){ adCard+='<div class="note-muted">Log meals to see how often you hit target.</div>'; }
  else { adCard+='<div class="row3">'
    +'<div class="stat"><div class="label">kcal on target</div><div class="v" style="font-size:20px">'+ad.kcalOk+'<span style="font-size:12px;color:var(--muted)">/'+ad.logged+'</span></div></div>'
    +'<div class="stat"><div class="label">Protein hit</div><div class="v" style="font-size:20px;color:var(--gold)">'+ad.protOk+'<span style="font-size:12px;color:var(--muted)">/'+ad.logged+'</span></div></div>'
    +'<div class="stat"><div class="label">Prot streak</div><div class="v" style="font-size:20px">'+ad.streak+'</div></div></div>'
    +'<div class="note-muted">'+ad.logged+' logged day'+(ad.logged>1?"s":"")+' · kcal within 10% · protein ≥90% of target</div>'; }
  adCard+='</section>';

  return '<div class="stack">'
    + '<div class="row3">'
    +   '<div class="stat"><div class="label">Sets · 7d</div><div class="v" style="font-size:24px">'+weekSets+'</div></div>'
    +   '<div class="stat"><div class="label">Sessions</div><div class="v" style="font-size:24px">'+weekSessions+'</div></div>'
    +   '<div class="stat"><div class="label">kcal today</div><div class="v" style="font-size:24px;color:var(--teal)">'+kToday+'</div></div>'
    + '</div>'
    + banner("Goal","目標")
    + goalCard
    + adCard
    + '<section class="card"><div class="label">Weight trend · kg & 7-day avg</div><div style="margin-top:8px">'+weightSVG()+'</div></section>'
    + '<section class="card"><div class="label">Weekly volume · sets by day</div>'+bars+'</section>'
    + '<section class="card stack-sm"><div class="label">Settings</div>'
    +   '<div class="note-muted">Targets · '+TARGETS.k+' kcal · '+TARGETS.p+'P / '+TARGETS.c+'C / '+TARGETS.f+'F</div>'
    +   '<button class="btn ghost small" style="color:var(--text)" onclick="App.openSetup()">'+(state.profile?'Recalculate targets':'Set up targets')+'</button>'
    +   '<div style="height:1px;background:var(--line);margin:6px 0"></div>'
    +   '<div class="note-muted">Backup — save a copy of all your data, or restore one. Do this before any app update.</div>'
    +   '<div class="row2"><button class="btn small" style="width:100%" onclick="App.exportData()">Export</button>'
    +     '<button class="btn small ghost" style="width:100%;color:var(--text)" onclick="App.triggerImport()">Import</button></div>'
    +   '<div style="height:1px;background:var(--line);margin:6px 0"></div>'
    +   '<div style="display:flex;align-items:center;justify-content:space-between"><div class="note-muted">IronTrunks '+APP_VERSION+'</div>'
    +     '<button class="chip" onclick="App.checkUpdate()">Check for update</button></div>'
    + '</section>'
    + '</div>';
}

/* ============================== RENDER ============================== */
const TABS=[["home","Home"],["train","Train"],["plan","Plan"],["eat","Eat"],["body","Body"],["stats","Stats"]];
const ICONS={
  home:'<svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10.5 12 3l9 7.5"/><path d="M5 9.5V21h14V9.5"/><path d="M9.5 21v-6h5v6"/></svg>',
  train:'<svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.4 14.4 9.6 9.6"/><path d="M18.657 21.485a2 2 0 1 1-2.829-2.828l-1.767 1.768a2 2 0 1 1-2.829-2.829l6.364-6.364a2 2 0 1 1 2.829 2.829l-1.768 1.767a2 2 0 1 1 2.828 2.829z"/><path d="m21.5 21.5-1.4-1.4"/><path d="M3.9 3.9 2.5 2.5"/><path d="M6.404 12.768a2 2 0 1 1-2.829-2.829l1.768-1.767a2 2 0 1 1-2.828-2.829l2.828-2.828a2 2 0 1 1 2.829 2.828l1.767-1.768a2 2 0 1 1 2.829 2.829z"/></svg>',
  plan:'<svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="8" height="4" x="8" y="2" rx="1"/><path d="M12 11h4"/><path d="M12 16h4"/><path d="M8 11h.01"/><path d="M8 16h.01"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/></svg>',
  eat:'<svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"/><path d="M7 2v20"/><path d="M21 15V2a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3Zm0 0v7"/></svg>',
  body:'<svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 7a4 4 0 1 1-8 0"/><path d="M3.5 21 8 7h8l4.5 14"/><path d="M2 21h20"/></svg>',
  stats:'<svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v16a2 2 0 0 0 2 2h16"/><path d="M18 17V9"/><path d="M13 17V5"/><path d="M8 17v-3"/></svg>',
};
function render(){
  document.getElementById("todayLabel").textContent=TODAY;
  const main=document.getElementById("main");
  if(state.setupOpen || isFreshUser()){ main.innerHTML=viewSetup(); document.getElementById("nav").innerHTML=""; return; }
  try{
    if(state.tab==="home") main.innerHTML=viewHome();
    else if(state.tab==="train") main.innerHTML=viewTrain();
    else if(state.tab==="plan") main.innerHTML=viewPlan();
    else if(state.tab==="eat") main.innerHTML=viewEat();
    else if(state.tab==="body") main.innerHTML=viewBody();
    else main.innerHTML=viewStats();
  }catch(err){
    main.innerHTML='<div class="stack"><section class="card stack-sm"><div class="label" style="color:var(--red)">This tab hit a snag</div>'
      +'<div class="note-muted">'+esc(String((err&&err.message)||err))+'</div>'
      +'<div class="note-muted">Your data is safe. Try another tab, or export a backup from Stats.</div>'
      +'<button class="btn" onclick="App.setTab(\'home\')">Back to Home</button></section></div>';
  }
  document.getElementById("nav").innerHTML=TABS.map(t=>
    '<button class="'+(state.tab===t[0]?'on':'')+'" onclick="App.setTab(\''+t[0]+'\')">'+ICONS[t[0]]+'<span class="tl">'+t[1]+'</span></button>').join("");
}

document.getElementById("importFile").addEventListener("change", function(ev){
  const f=ev.target.files && ev.target.files[0]; if(f) App.importData(f); ev.target.value="";
});

/* init selections */
(function(){ const ld=state.plan.filter(d=>d.type==="lift"); if(ld[0]){ state.trainDay=ld[0].id; const n=ld[0].exercises.map(e=>e.name).filter(Boolean); state.trainEx=n[0]||null; } })();
render();

/* PWA: offline + persistence */
if("serviceWorker" in navigator){
  window.addEventListener("load",()=>{
    let refreshing=false;
    if(navigator.serviceWorker.controller){
      navigator.serviceWorker.addEventListener("controllerchange",()=>{ if(refreshing) return; refreshing=true; location.reload(); });
    }
    navigator.serviceWorker.register("./sw.js",{updateViaCache:"none"}).then((reg)=>{
      reg.update();
      setInterval(()=>reg.update(), 60*60*1000);
      document.addEventListener("visibilitychange",()=>{ if(!document.hidden) reg.update(); });
    }).catch(e=>console.warn("SW failed",e));
  });
}
if(navigator.storage && navigator.storage.persist){ navigator.storage.persist().catch(()=>{}); }
</script>
